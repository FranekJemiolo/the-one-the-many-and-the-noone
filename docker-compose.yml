version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: book
      POSTGRES_PASSWORD: book
      POSTGRES_DB: bookdb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U book"]
      interval: 5s
      timeout: 5s
      retries: 5

  test-runner:
    build:
      context: .
      dockerfile: Dockerfile.test
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://book:book@db:5432/bookdb
      NODE_ENV: test
    volumes:
      - .:/app
      - /app/node_modules
    command: npm test
