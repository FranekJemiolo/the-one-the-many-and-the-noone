arcs:
  stable_reality_breakdown:
    pacing:
      frameDelay: 500
      suspense: "low"
    visuals:
      tone: "subtle unease"

  interpretation_systems_emerge:
    pacing:
      frameDelay: 600
      suspense: "medium"
    visuals:
      tone: "breaking reality"

  system_collapse:
    pacing:
      frameDelay: 700
      suspense: "high"
    visuals:
      tone: "structural awareness"

  identity_crystallization:
    pacing:
      frameDelay: 800
      suspense: "high"
    visuals:
      tone: "identity collapse"

  endgame_configuration:
    pacing:
      frameDelay: 900
      suspense: "none"
    visuals:
      tone: "transcendent"

stateMappings:
  - var: "aleksy_dominance"
    label: "Causal Interpretation"
    description: "Strength of Aleksy's causal reality layer"
    ranges:
      - min: 0
        max: 3
        label: "Weak"
      - min: 4
        max: 6
        label: "Moderate"
      - min: 7
        max: 10
        label: "Dominant"

  - var: "mira_dominance"
    label: "Emotional Interpretation"
    description: "Strength of Mira's emotional reality layer"
    ranges:
      - min: 0
        max: 3
        label: "Weak"
      - min: 4
        max: 6
        label: "Moderate"
      - min: 7
        max: 10
        label: "Dominant"

  - var: "nemesis_compression"
    label: "Interpretive Compression"
    description: "Level of Nemesis/Engine reality compression"
    ranges:
      - min: 0
        max: 3
        label: "Minimal"
      - min: 4
        max: 6
        label: "Partial"
      - min: 7
        max: 10
        label: "Maximum"

  - var: "rose_coherence"
    label: "Coherence Field"
    description: "Strength of Rose's contradiction stabilization"
    ranges:
      - min: 0
        max: 3
        label: "Weak"
      - min: 4
        max: 6
        label: "Moderate"
      - min: 7
        max: 10
        label: "Strong"

  - var: "null_exposure"
    label: "Void Exposure"
    description: "Exposure to Null Child interpretation failure zones"
    ranges:
      - min: 0
        max: 2
        label: "None"
      - min: 3
        max: 5
        label: "Limited"
      - min: 6
        max: 10
        label: "Severe"

  - flag: "witness_crystallized"
    label: "Witness Identity"
    description: "Whether the Witness has crystallized into a named entity"
    booleanValues:
      true: "Echo Emerged"
      false: "Nameless"

  - flag: "guard_crystallized"
    label: "Guard Identity"
    description: "Whether the Guard has crystallized into a named entity"
    booleanValues:
      true: "Identity Formed"
      false: "Nameless"
