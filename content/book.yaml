arcs:
  stable_reality_breakdown:
    pacing:
      frameDelay: 500
      suspense: "low"
    visuals:
      tone: "subtle unease"

  interpretation_systems_emerge:
    pacing:
      frameDelay: 600
      suspense: "medium"
    visuals:
      tone: "breaking reality"

  system_collapse:
    pacing:
      frameDelay: 700
      suspense: "high"
    visuals:
      tone: "structural awareness"

  identity_crystallization:
    pacing:
      frameDelay: 800
      suspense: "high"
    visuals:
      tone: "identity collapse"

  endgame_configuration:
    pacing:
      frameDelay: 900
      suspense: "none"
    visuals:
      tone: "transcendent"

stateMappings:
  - var: "aleksy_dominance"
    label: "Causal Interpretation"
    description: "Strength of Aleksy's causal perspective"
    ranges:
      - min: 0
        max: 3
        label: "Weak"
      - min: 4
        max: 6
        label: "Moderate"
      - min: 7
        max: 10
        label: "Dominant"

  - var: "mira_dominance"
    label: "Emotional Interpretation"
    description: "Strength of Mira's emotional perspective"
    ranges:
      - min: 0
        max: 3
        label: "Weak"
      - min: 4
        max: 6
        label: "Moderate"
      - min: 7
        max: 10
        label: "Dominant"

  - var: "sava_relationship"
    label: "Sava Relationship"
    description: "Depth of relationship with Sava Illich"
    ranges:
      - min: 0
        max: 2
        label: "Acquaintance"
      - min: 3
        max: 5
        label: "Collaborator"
      - min: 6
        max: 10
        label: "Close Guide"

  - var: "threshold_reached"
    label: "Perception Threshold"
    description: "Whether Aleksy has reached his perception threshold"
    ranges:
      - min: 0
        max: 0
        label: "Not Reached"
      - min: 1
        max: 10
        label: "Threshold Reached"

  - flag: "stay_choice"
    label: "Stay Choice"
    description: "Whether Aleksy chose to stay with Mira"
    booleanValues:
      true: "Chose to Stay"
      false: "Did Not Stay"

  - flag: "shift_choice"
    label: "Shift Choice"
    description: "Whether Aleksy chose to shift to new version"
    booleanValues:
      true: "Chose to Shift"
      false: "Did Not Shift"

  - flag: "identity_crystallization"
    label: "Identity Crystallization"
    description: "Whether identity has crystallized after threshold"
    booleanValues:
      true: "Crystallized"
      false: "Not Crystallized"

  - flag: "convergence_complete"
    label: "Convergence Complete"
    description: "Whether the convergence phase is complete"
    booleanValues:
      true: "Complete"
      false: "Incomplete"
