id: ch45_shifting_configuration_experienced
content:
  - type: text
    value: "The system experiences The Shifting World configuration. The system oscillates between configurations. No final state is chosen."
  - type: pause
    duration: 800
  - type: text
    value: "This is a simulation, not a permanent change. The system is experiencing what it would be like to choose The Shifting World as its final configuration."
  - type: pause
    duration: 800
  - type: text
    value: "In this configuration, the system perpetually shifts between The One, The Many, The No-One, and The Overlap. No configuration is permanent. Reality is in constant motion."
  - type: pause
    duration: 800
  - type: text
    value: "You experience the dynamism of this configuration. There is perpetual change. There is perpetual novelty. There is perpetual motion between states."
choices:
  - text: "Observe the perpetual motion achieved"
    goto: ch45_perpetual_motion_achieved
