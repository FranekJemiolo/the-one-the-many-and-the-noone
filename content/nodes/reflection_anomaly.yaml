id: reflection_anomaly
content:
  - type: text
    value: "You check your reflection in the office mirror. It shows you what you expect to see—your face, your clothes, the office behind you. But the timing is wrong."
  - type: pause
    duration: 500
  - type: text
    value: "You move your hand, and the reflection doesn't respond immediately. There's a delay—just a fraction of a second, but noticeable. Like the reflection is being rendered from a remote server with network latency."
  - type: pause
    duration: 500
  - type: text
    value: "You move your head faster, and the reflection struggles to keep up. For a moment, you see two versions of your face—the one you're making now, and the one from a moment ago, overlapping in the glass."
  - type: pause
    duration: 500
  - type: text
    value: "Then you notice something more disturbing: when you stop moving, your reflection continues for a moment before stopping, as if it's extrapolating your motion based on prediction rather than reflecting reality."
  - type: pause
    duration: 700
  - type: text
    value: "The reflection looks at you with an expression you didn't make—curiosity, perhaps, or recognition. Then it returns to matching your face, but you can't shake the feeling that it was autonomous for that moment."
choices:
  - text: "Touch the mirror"
    goto: mirror_touch
  - text: "Walk away quickly"
    goto: ch2_to_ch3_bridge
