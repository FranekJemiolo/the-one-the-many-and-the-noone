id: ch11_chapter_end
content:
  - type: text
    value: |
      The chapter ends with you leaving Dr. Kaczmarek's office, the joint documentation session complete.
      If you chose to reframe your perception as an asset, you're cautiously optimistic—Dr. Kaczmarek has a strategy, a way to demonstrate value rather than risk.
      But you also know the company's primary concern is stability. If they see you as destabilizing, they will act.
  - type: pause
    duration: 1000
  - type: text
    value: |
      If you chose to prepare for institutional conflict, you're bracing for what's coming—you know the company will make a move, you know you need to be ready.
      But you're also grateful for Dr. Kaczmarek's help, for his willingness to warn you even if you're preparing to fight the system.
  - type: pause
    duration: 800
  - type: text
    value: |
      Either way, the resonant perception is real. Mira is experiencing it too. The perception is spreading, affecting the people around you.
      This changes the institutional calculation. You're no longer just a single-person anomaly—you're a potential vector for spreading multiplicity.
  - type: pause
    duration: 800
  - type: text
    value: |
      Mira is still your anchor. The love you confessed in Chapter 8 is solid, lasting, the foundation for everything that comes next.
      She's not just experiencing the resonance—she's embracing it, standing with you, refusing to let the system isolate you.
  - type: pause
    duration: 1000
  - type: text
    value: |
      Dr. Kaczmarek is becoming more than just a question mark—he's an ally, whether you're reframing or preparing for conflict.
      He believes in understanding. He believes your perception is real. He's willing to help, even if it means going against the system he works for.
  - type: pause
    duration: 800
  - type: text
    value: |
      This is the escalation of Part II. The perception is spreading. The institutional pressure is intensifying. The choices are becoming more consequential.
      The cracks in reality are widening. The system is responding. The convergence is approaching.
  - type: pause
    duration: 1000
  - type: text
    value: |
      The memory sanctuary showed you something important:
      contradictions can coexist without requiring resolution.
      But with Mira by your side and Dr. Kaczmarek in your corner, you're starting to think that who you are might be worth fighting for.
choices:
  - text: "Continue to Chapter 12"
    goto: chapter_12
    set:
      chapter_11_completed: 1
