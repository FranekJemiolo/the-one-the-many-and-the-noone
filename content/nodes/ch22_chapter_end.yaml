id: ch22_chapter_end
content:
  - type: text
    value: |
      The chapter ends with your second meeting with Sava. She's shown you that your perception is accelerating toward a threshold—the point where you can choose which version of reality to inhabit.
      If you asked about adaptation, you learned that the key is having an anchor—a home base in one version while visiting others as needed.
      For you, that anchor is Mira. She's what makes this version feel like home.
  - type: pause
    duration: 1000
  - type: text
    value: |
      If you asked about shifting, you learned that people choose based on comfort, connection, or purpose—what feels like home.
      Shifting isn't death—it's relocation. The person still exists, just in a different version of reality.
      But that doesn't make it easier for the people left behind.
  - type: pause
    duration: 800
  - type: text
    value: |
      Either way, Sava is challenging you to think about where you belong. In this version, with Mira? Or in another version, where your perception is the norm?
      The threshold is approaching. The choice will have to be made.
  - type: pause
    duration: 800
  - type: text
    value: |
      Time has collapsed at Geostation Three.
      Linear causality is no longer the rule.
      Mira is still your anchor. The love you confessed in Chapter 8 is solid, lasting, the foundation for everything that comes next.
      She's your reason to stay in this version, your connection to the life you've built.
      But Sava is suggesting that staying might not be a choice you get to make.
  - type: pause
    duration: 1000
  - type: text
    value: |
      Dr. Kaczmarek is still your ally—connecting you with Sava, supporting your exploration, going against the system he works for.
      He believes in understanding. He believes your perception is real. He's willing to help you find answers.
  - type: pause
    duration: 800
  - type: text
    value: |
      This is the continuation of Part III. The legal battle is won, but the personal journey continues.
      The cracks in reality are widening. The system is responding. The convergence is approaching.
      And Sava Illich is becoming a mirror—showing you what you're becoming, challenging you to think about where you belong.
choices:
  - text: "Continue to Chapter 23"
    goto: chapter_23
    set:
      chapter_22_completed: 1
