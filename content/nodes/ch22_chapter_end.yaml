id: ch22_chapter_end
content:
  - type: text
    value: |
      You leave Geostation Three, the station continuing to operate in temporal multiplicity. The researchers move through temporal fields, accessing different moments without traversing the intervening sequence. The Guard checkpoints passengers across temporal versions, processing travelers who exist in multiple temporal states simultaneously.
      The station has adapted completely to the collapse of linear time.
  - type: pause
    duration: 1000
  - type: text
    value: |
      This is not a breakdown, not a failure of the station's systems. It is an evolution, a transformation into a different mode of existence. The station has adapted to temporal multiplicity and found a way to function within it.
      The researchers have developed new protocols, new ways of thinking about causality that work in a temporal field rather than a temporal line.
  - type: pause
    duration: 800
  - type: text
    value: |
      You realize the Engine's fear is unfounded. Temporal multiplicity is not chaos, not the breakdown of order into disorder. It is a different way of existing that the Engine cannot control, but that can function perfectly well.
      The Engine's assumption that plural reality inevitably leads to collapse is proven wrong by the very existence of a functioning Geostation Three.
  - type: pause
    duration: 800
  - type: text
    value: |
      The collapse of linear time has not destroyed the station. It has transformed it into something the Engine cannot recognize as valid, but that works nonetheless. The station operates according to different principles, but it operates.
      The transformation is successful, the adaptation complete.
  - type: pause
    duration: 1000
  - type: text
    value: |
      This is the pattern for the system collapse phase. Oscillation breaks not into chaos, but into new states of multiplicity that the Engine cannot control but that function anyway.
      The collapse of the old order is not a failure—it is the emergence of new configurations that the Engine cannot recognize but that are nonetheless valid.
choices:
  - text: "Continue to Chapter 23"
    goto: chapter_23
    set:
      chapter_22_completed: 1
