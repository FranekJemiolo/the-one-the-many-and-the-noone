id: ch1_building_exploration
content:
  - type: text
    value: |
      Instead of returning to the office, you decide to explore the building further, searching for other signs of the anomaly that might reveal its nature.
      The building has five floors above ground, two below. You start at the top and work your way down, methodical in your investigation.
  - type: pause
    duration: 800
  - type: text
    value: |
      The upper floors are ordinary—offices, cubicles, meeting rooms. Nothing unusual. But as you descend, you notice a pattern:
      the feeling of spatial expansion, the sense that rooms are slightly larger than they should be, grows stronger the lower you go.
  - type: pause
    duration: 800
  - type: text
    value: |
      By the time you reach the basement, the effect is unmistakable. The underground parking garage feels vast, its dimensions extending beyond what the blueprint allows.
      When you walk to the far wall and back, the distance feels different each time, as if the space is actively adjusting to your presence.
  - type: pause
    duration: 1000
  - type: text
    value: |
      In the corner of the basement, you find something unexpected: a door that doesn't appear on the building plans. It's unmarked, unpainted, as if it was added after the original construction but never integrated into the building's official layout.
      The handle is cold to the touch, colder than the surrounding air.
  - type: pause
    duration: 800
  - type: text
    value: |
      You try the door. It's locked. But as you touch the handle, you feel a response—not from the lock mechanism, but from something deeper, as if the building itself is acknowledging your presence.
      The feeling is not hostile, but it is aware, and it is assessing you.
  - type: pause
    duration: 800
  - type: text
    value: |
      You have a choice: force the door and risk triggering whatever security system the building might have, or leave it for now and return with proper authorization.
      But part of you suspects that authorization won't matter—that this door responds to something other than bureaucratic permission.
choices:
  - text: "Force the door"
    goto: ch1_forced_entry
    set:
      risk_taking: 1
      door_attempted: 1
  - text: "Leave the door and document its location"
    goto: ch1_door_documented
    set:
      caution_score: 1
      door_location_known: 1
