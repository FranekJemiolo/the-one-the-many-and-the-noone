id: ch33_chapter_end
content:
  - type: text
    value: |
      The chapter ends with the convergence arriving. Reality has begun to restructure, the boundaries between versions becoming permeable, the multiplicity becoming more accessible.
      If you chose to stay, you can access other versions more easily than ever before. The gaps between realities have widened.
      If you chose to shift, you can access this version more easily than ever before. The connection across versions has strengthened.
  - type: pause
    duration: 1000
  - type: text
    value: |
      Either way, the convergence is transforming reality. The system is restructuring to accommodate multiplicity more fully.
      People with unusual perception are finding their abilities enhanced. The cracks in reality are widening. The boundaries are dissolving.
  - type: pause
    duration: 800
  - type: text
    value: |
      Sava confirmed that this is what was predicted—a new configuration of reality that accommodates multiplicity more fully.
      She assured you that you're prepared, that you've been living with multiplicity for years, that you'll be fine.
      She also assured you that Mira is prepared, that she's been living with her own perception development, that she'll be fine.
  - type: pause
    duration: 1000
  - type: text
    value: |
      Mira is still your anchor. If you stayed, she's building a life with you, your love enduring through the years and the convergence.
      If you shifted, she's building a life in this version while you build yours in another, connected across the multiplicity by the love you share.
  - type: pause
    duration: 800
  - type: text
    value: |
      Dr. Kaczmarek is still your ally—checking in on you, supporting your journey, going against the system he works for.
      He believes in understanding. He believes your perception is real. He's willing to help you find answers.
  - type: pause
    duration: 1000
  - type: text
    value: |
      Sava Illich has been your guide through the threshold—helping you understand your perception, navigate the choice, live with the consequences.
      Now she's confirming that the convergence has arrived, that reality is restructuring, that you're prepared for what comes next.
  - type: pause
    duration: 800
  - type: text
    value: |
      This is the continuation of the convergence phase. Identity is crystallizing. The cracks in reality are widening. The system is responding.
      Aleksy Wrona. That's your name. That's who you are supposed to be.
      The convergence is here—and it's changing everything.
choices:
  - text: "Continue to Chapter 34"
    goto: chapter_34
    set:
      chapter_33_completed: 1
