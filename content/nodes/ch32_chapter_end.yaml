id: ch32_chapter_end
content:
  - type: text
    value: |
      The chapter ends with the convergence approaching. The cracks in reality are widening. The multiplicity is becoming more accessible. The boundaries between versions are becoming more permeable.
      If you chose to stay, you're becoming more adept at accessing other versions while remaining anchored in this one.
      If you chose to shift, you're becoming more adept at accessing this version while remaining anchored in the new one.
  - type: pause
    duration: 1000
  - type: text
    value: |
      Either way, the convergence is real. The system is responding to the choices you've made.
      Sava warned that the convergence could lead to a new configuration of reality—one that accommodates multiplicity more fully.
      But it's unpredictable. The system could restructure in ways we can't anticipate.
  - type: pause
    duration: 800
  - type: text
    value: |
      Mira is still your anchor. If you stayed, she's building a life with you, your love enduring through the years.
      If you shifted, she's building a life in this version while you build yours in another, connected across the multiplicity by the love you share.
  - type: pause
    duration: 1000
  - type: text
    value: |
      Dr. Kaczmarek is still your ally—checking in on you, supporting your journey, going against the system he works for.
      He believes in understanding. He believes your perception is real. He's willing to help you find answers.
  - type: pause
    duration: 800
  - type: text
    value: |
      Sava Illich has been your guide through the threshold—helping you understand your perception, navigate the choice, live with the consequences.
      Now she's warning you about the convergence—the approaching restructuring of reality that will affect everyone with unusual perception.
  - type: pause
    duration: 1000
  - type: text
    value: |
      This is the continuation of the convergence phase. Identity is crystallizing. The cracks in reality are widening. The system is responding.
      Aleksy Wrona. That's your name. That's who you are supposed to be.
      But the convergence is coming—and it will change everything.
choices:
  - text: "Continue to Chapter 33"
    goto: chapter_33
    set:
      chapter_32_completed: 1
