id: ch21_nemesis_origins
content:
  - type: text
    value: |
      The meeting with Sava Illich takes place in her office—a converted warehouse space filled with books, papers, and artifacts from years of research.
      She's younger than you expected, with sharp eyes and an intensity that suggests she's seen things most people haven't.
  - type: pause
    duration: 800
  - type: text
    value: |
      "Aleksy Wrona," she says, shaking your hand. "Dr. Kaczmarek told me about your case. Your legal victory is significant."
      "It established rights. But it didn't give me answers."
      "No. The law can protect you, but it can't explain you. That's what I'm here for."
  - type: pause
    duration: 800
  - type: text
    value: |
      She gestures to a chair. "Tell me about your perception. The dreams. The animal POV. The temporal perception."
      You tell her everything—the hunt, the escape, the alternate selves, the resonant perception spreading to Mira.
      She listens, taking notes, her expression thoughtful.
  - type: pause
    duration: 1000
  - type: text
    value: |
      "This is consistent with other cases I've documented," she says when you finish. "Your perception is developing along predictable patterns. You're accessing multiple versions of reality, experiencing them as memory rather than imagination."
      "What does that mean?"
      "It means reality is multiple, and your perception is evolving to access that multiplicity. You're not broken—you're evolving."
choices:
  - text: "Ask about other cases she's documented"
    goto: ch21_other_cases
    set:
      sava_introduction: 1
      research_interest: 1
  - text: "Ask about what this means for your future"
    goto: ch21_future_implications
    set:
      sava_introduction: 1
      future_concern: 1
