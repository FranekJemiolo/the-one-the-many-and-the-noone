id: ch21_chapter_end
content:
  - type: text
    value: "You leave the conflict zone. The oscillation between Rose's coexistence and Nemesis's compression continues, creating intense tension."
  - type: pause
    duration: 1000
  - type: text
    value: "This is the beginning of the system collapse phase. The conflict between interpretation systems is no longer contained. It is becoming visible and active."
  - type: pause
    duration: 800
  - type: text
    value: "You realize this is the inevitable consequence of the stalemate. The system cannot oscillate indefinitely between coexistence and compression. Something will break."
  - type: pause
    duration: 800
  - type: text
    value: "The next chapters will show how this break manifests. Geostation collapse. Identity fragmentation. Emotional-causal split becoming permanent. The system is moving toward a point where oscillation is no longer possible."
  - type: pause
    duration: 1000
  - type: text
    value: "This is not the end. This is the beginning of the collapse that will force the system to choose between incompatible realities."
choices:
  - text: "Continue to Chapter 22"
    goto: chapter_22
