id: ch21_chapter_end
content:
  - type: text
    value: |
      The chapter ends with your first meeting with Sava Illich. She's documented cases like yours—people with unusual perception who are accessing multiple versions of reality.
      If you asked about other cases, you learned that some adapted, some broke, some shifted to alternate versions where their perception is the norm.
      You're not alone. You're not the first. You won't be the last.
  - type: pause
    duration: 1000
  - type: text
    value: |
      If you asked about future implications, you learned that your perception will continue to develop, that eventually you'll have the ability to choose which version of reality to inhabit.
      Sava warned that perception development doesn't respect our choices—it follows its own patterns.
  - type: pause
    duration: 800
  - type: text
    value: |
      Either way, the meeting has opened new possibilities. Sava is a mirror—someone who understands your perception from the inside, who can help you navigate what's coming.
      She's not a psychiatrist, not bound by institutional frameworks. She's an independent researcher who studies unusual perception without bias.
  - type: pause
    duration: 800
  - type: text
    value: |
      Coexistence vs compression—the battle for reality's future.
      Rose Field represents the possibility of contradictions living together. Nemesis represents the demand for singular truth.
      Mira is still your anchor. The love you confessed in Chapter 8 is solid, lasting, the foundation for everything that comes next.
      She's your reason to stay in this version, your connection to the life you've built, the person who makes you want to fight for your right to exist here.
  - type: pause
    duration: 1000
  - type: text
    value: |
      Dr. Kaczmarek is still your ally—connecting you with Sava, supporting your exploration, going against the system he works for.
      He believes in understanding. He believes your perception is real. He's willing to help you find answers.
  - type: pause
    duration: 800
  - type: text
    value: |
      This is the beginning of Part III. The legal battle is won, but the personal journey continues.
      The cracks in reality are widening. The system is responding. The convergence is approaching.
      And Sava Illich has entered your life—a mirror who can help you understand what you're becoming.
choices:
  - text: "Continue to Chapter 22"
    goto: chapter_22
    set:
      chapter_21_completed: 1
