id: ch2_split_perspective
content:
  - type: text
    value: |
      You sit with the realization, letting it settle into your understanding. The facts are correct. The feelings are wrong. Both are true simultaneously.
      This is not a paradox that needs to be resolved. It is a structural feature of reality that needs to be accepted.
  - type: pause
    duration: 1000
  - type: text
    value: |
      This is not a contradiction. It is a split. Causal reality follows one sequence, governed by the laws of cause and effect.
      Emotional reality follows another sequence, governed by different laws that you do not yet understand. They do not need to agree because they are not describing the same thing.
  - type: pause
    duration: 800
  - type: text
    value: |
      The Patient watches you, their eyes meeting yours with a look of recognition. They seem relieved that you understand, not that you agree with their account—just that you can hold both sequences without forcing them to reconcile.
      The relief is palpable, as if they have been waiting for someone who could accept the split without demanding that it be fixed.
  - type: pause
    duration: 800
  - type: text
    value: |
      You write in your notebook with deliberate precision, the words capturing the structural insight: 'Emotional and causal timelines are independent systems.
      Divergence is not error. It is structural. Reality contains multiple layers that operate on different principles.'
  - type: pause
    duration: 1000
  - type: text
    value: |
      This is the second crack. First: memory divergence, where multiple versions of the same moment coexist. Now: emotional-causal split, where different ways of experiencing the same present operate independently.
      Reality is not just producing multiple pasts. It is producing multiple ways of experiencing the same present, multiple layers of truth that do not need to agree.
choices:
  - text: "Conclude the examination"
    goto: ch2_chapter_end
