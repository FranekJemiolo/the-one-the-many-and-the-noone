id: ch20_aleksy_approach
content:
  - type: text
    value: |
      The final chapter of Part II brings reflection on everything that has happened.
      You look back at the journey—from the first dreams, to meeting Mira, to Dr. Kaczmarek's involvement, to the legal battle, to the victory that established your rights.
      It's been a long road, and you're not the same person who started it.
  - type: pause
    duration: 800
  - type: text
    value: |
      "You've changed," Mira observes one evening. "You're more confident. More sure of who you are."
      "I had to be. The system tried to erase me. I had to fight back."
      She nods. "And you won. But the fighting changed you too."
  - type: pause
    duration: 800
  - type: text
    value: |
      "Is that bad?"
      "No. It's necessary. Survival requires change."
      She takes your hand. "But don't lose the parts of yourself that made you worth fighting for. The kindness. The curiosity. The capacity to love."
  - type: pause
    duration: 1000
  - type: text
    value: |
      You think about this. The legal battle made you stronger, more resilient, more aware of your rights.
      But it also made you more guarded, more strategic, more willing to see the world in terms of allies and adversaries.
      You don't want to lose the parts of yourself that made you worth fighting for.
  - type: pause
    duration: 800
  - type: text
    value: |
      Dr. Kaczmarek calls to check in. "How are you doing after the victory?"
      "Still processing. It feels significant, but also like there's more to come."
      "There always is. Perception doesn't stop developing just because you've won a legal battle."
      He pauses. "The offer to meet Sava Illich still stands. If you change your mind."
choices:
  - text: "Accept the offer to meet Sava Illich"
    goto: ch20_sava_meeting
    set:
      dr_kaczmarek_trust: 95
      sava_introduction: 1
  - text: "Decline, focus on life with Mira without further exploration"
    goto: ch20_life_focus
    set:
      aleksy_detachment: 50
      mira_trust: 100
