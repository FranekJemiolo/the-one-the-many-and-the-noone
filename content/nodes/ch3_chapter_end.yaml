id: ch3_chapter_end
content:
  - type: text
    value: |
      Your transport departs Geostation Three, the station receding in the viewport as you accelerate away, continuing its work in multiple timelines simultaneously.
      From this distance, the station looks normal, a speck of light against the darkness of space, but you know now that it contains multiple temporal realities folded into the same physical location.
  - type: pause
    duration: 1000
  - type: text
    value: |
      You look at your own watch, the display showing a single sequence of time moving forward in linear progression. For now, at least, your personal timeline remains singular.
      But you know this is a choice, not a necessity. Time could be multiple if you allowed it, if you opened yourself to the possibility of experiencing multiple sequences simultaneously.
  - type: pause
    duration: 800
  - type: text
    value: |
      The cracks are accumulating in the foundation of your understanding. Memory divergence, where multiple versions of the same moment coexist. Emotional-causal split, where different ways of experiencing the present operate independently.
      Temporal instability, where multiple timelines exist simultaneously. Reality is not just broken—it is reconfiguring itself into something plural, something that contains multiple layers of truth.
  - type: pause
    duration: 800
  - type: text
    value: |
      You don't know what the next crack will be, what new form of multiplicity will reveal itself. But you know it's coming. The pattern is clear: each anomaly reveals a new way reality can be multiple.
      The question is no longer whether reality is singular. The question is how many versions it can sustain before the system cannot hold them all.
choices:
  - text: "Continue to Chapter 4"
    goto: chapter_4
    set:
      chapter_3_completed: 1
