id: ch28_chapter_end
content:
  - type: text
    value: |
      The chapter ends with you building a life after your threshold choice.
      If you chose to stay, you and Mira are building a life together in this version. Your perception has stabilized—you can access the multiplicity while remaining anchored in this version.
      You've become a bridge between realities, able to visit other versions while making this one your home.
  - type: pause
    duration: 1000
  - type: text
    value: |
      If you chose to shift, you're building a life in the new version where multiplicity is the norm.
      Your perception has stabilized—you're accepted, you belong, you're part of a community where everyone experiences multiple realities.
      But you still think about Mira every day.
  - type: pause
    duration: 800
  - type: text
    value: |
      Either way, the legal battle feels like a lifetime ago. The precedent you set is helping others—people with unusual perception are winning their cases, companies are changing their policies, the system is adapting.
      Dr. Kaczmarek reminded you that there's no perfect choice, but there's your choice, and you have to live with it.
  - type: pause
    duration: 800
  - type: text
    value: |
      The machines of Morrow Vale have evolved.
      They're no longer just synthetic—they're living, integrated into the ecological system.
  - type: pause
    duration: 1000
  - type: text
    value: |
      Mira is still your anchor. If you stayed, she's building a life with you, celebrating your choice to remain.
      If you shifted, she's grieving your departure in this version, even though you still exist in another version.
  - type: pause
    duration: 1000
  - type: text
    value: |
      Dr. Kaczmarek is still your ally—checking in on you, supporting your journey, going against the system he works for.
      He believes in understanding. He believes your perception is real. He's willing to help you find answers.
  - type: pause
    duration: 800
  - type: text
    value: |
      This is the continuation of Part III. The legal battle is won, but the personal journey continues.
      The cracks in reality are widening. The system is responding. The convergence is approaching.
      And you're learning to live with your choice—building a life in the version you selected.
choices:
  - text: "Continue to Chapter 29"
    goto: chapter_29
    set:
      chapter_28_completed: 1
