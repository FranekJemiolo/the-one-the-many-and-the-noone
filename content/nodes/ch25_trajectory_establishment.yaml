id: ch25_trajectory_establishment
content:
  - type: text
    value: |
      Weeks pass after your conversation with Mira. You continue meeting with Sava, documenting your perception development while supporting Mira through her own emerging perception.
      Sava is impressed by your progress. "Your perception is developing faster than most cases. The threshold is approaching sooner than I expected."
      "How soon?"
      "Months. Maybe less."
  - type: pause
    duration: 800
  - type: text
    value: |
      "And Mira?"
      "Her perception is developing too, but at a slower pace. She's at an earlier stage."
      Sava pauses. "This creates a timing mismatch. You might reach your threshold before she reaches hers. You might have to make your choice before she's ready to make hers."
  - type: pause
    duration: 800
  - type: text
    value: |
      "What happens then?"
      "Then you'll have to decide whether to wait for her, or make your choice alone."
      She meets your eyes. "Waiting is risky. The longer you wait at the threshold, the more unstable your perception becomes. You could fracture before she catches up."
  - type: pause
    duration: 1000
  - type: text
    value: |
      "And if I make my choice alone?"
      "Then she'll have to make hers later. And if your choices don't align, you'll end up in different versions."
      She pauses. "The timing mismatch is a real complication. It's forcing you to choose between your stability and your connection."
choices:
  - text: "Decide to wait for Mira, risk instability"
    goto: ch25_waiting_choice
    set:
      sava_relationship: 1
      loyalty_priority: 1
  - text: "Decide to prioritize stability, make choice when ready"
    goto: ch25_stability_choice
    set:
      sava_relationship: 1
      stability_priority: 1
