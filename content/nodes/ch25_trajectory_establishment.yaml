id: ch25_trajectory_establishment
content:
  - type: text
    value: |
      You support establishing the trajectory training center, helping the Passengers develop protocols for systematic trajectory multiplicity adaptation.
      The center begins operations, bringing people from across the system to experience multiple paths and develop the capacity to navigate plural movement.
  - type: pause
    duration: 800
  - type: text
    value: |
      "The training is successful," the Passengers report after months of operation. "Hundreds of people have developed trajectory multiplicity perception, and the adaptation is spreading as they return to their home zones."
      "The system's capacity for plural movement is increasing significantly."
  - type: pause
    duration: 800
  - type: text
    value: |
      "The Engine is responding," you observe. "It's trying to suppress the trajectory multiplicity training, attempting to prevent the spread of plural movement."
      "But the adaptation is self-propagating—once people experience trajectory multiplicity, they retain the capacity even in singular movement zones."
  - type: pause
    duration: 1000
  - type: text
    value: |
      The Passengers agree. "The Engine cannot reverse the adaptation. Trajectory multiplicity perception is becoming widespread, and the system is adapting to plural movement at scale."
      "The training center is achieving its purpose."
choices:
  - text: "Continue the chapter with the trajectory center established"
    goto: ch25_trajectory_multiplicity
    set:
      trajectory_establishment: 1
      adaptation_spreading: 1
