id: ch13_morrow_appearance
content:
  - type: text
    value: |
      The days after the legal counsel meeting are difficult. If you accepted the separation package, you're reviewing the agreement with your own counsel, trying to understand what you're signing away.
      If you refused, you're meeting with attorneys Dr. Kaczmarek connected you with, trying to build a legal strategy.
  - type: pause
    duration: 800
  - type: text
    value: |
      Either way, you're unemployed. The company has moved quickly—your access was revoked, your belongings were packed and shipped, your presence was erased from the building.
      It's as if you never worked there. As if you never existed.
  - type: pause
    duration: 800
  - type: text
    value: |
      Mira is your constant. She comes over every day, helps you organize your documents, listens to you vent about the injustice of it all.
      "They can't just erase you," she says. "You existed. You worked there. You mattered."
      "Not to them. To them, I was a liability. A risk. Something to be eliminated."
  - type: pause
    duration: 1000
  - type: text
    value: |
      "That's their problem," she says. "Not yours. Your problem is figuring out what comes next."
      She takes your hand. "And you're not figuring it out alone. We're in this together."
      The words are familiar—she's said them before, in different contexts. But they mean more now, in the face of actual institutional erasure.
  - type: pause
    duration: 800
  - type: text
    value: |
      Dr. Kaczmarek calls to check in. "How are you holding up?"
      "As well as can be expected."
      "The company is moving quickly. They want this resolved. They want you gone and forgotten."
      "I'm not going to let them forget me."
  - type: pause
    duration: 1000
  - type: text
    value: |
      "Good. Because your case matters. It's not just about you. It's about anyone who perceives reality differently. Anyone who doesn't fit into the system's requirements."
      He pauses. "If we fight this, if we win, we set a precedent. We make it harder for the system to erase people like you."
      "I'm ready to fight."
choices:
  - text: "Focus on building a legal strategy"
    goto: ch13_legal_strategy
    set:
      legal_conflict: 1
      dr_kaczmarek_trust: 80
  - text: "Focus on personal healing and moving forward"
    goto: ch13_personal_healing
    set:
      aleksy_detachment: 60
      mira_trust: 100
