id: ch24_knowledge_establishment
content:
  - type: text
    value: |
      After leaving Sava's office, you go to Mira. You need to tell her what you learned—that her dreams that feel like memories are signs of resonant perception, that your perception is spreading to her.
      She's cooking dinner when you arrive. The domestic scene makes the conversation harder.
  - type: pause
    duration: 800
  - type: text
    value: |
      "I talked to Sava today," you say. "She asked about you. About whether you've been experiencing anything unusual."
      Mira pauses, her knife hovering over the vegetables. "Like what?"
      "Like dreams that feel like memories. Moments that didn't happen in this version."
      She sets down the knife. "How did she know?"
  - type: pause
    duration: 800
  - type: text
    value: |
      "Because it's common. When someone develops unusual perception, it often spreads to close contacts through emotional connection."
      You take a breath. "Your perception is developing, Mira. You're starting to access the multiplicity through our connection."
      She's quiet for a long moment. "Is that dangerous?"
  - type: pause
    duration: 1000
  - type: text
    value: |
      "Not necessarily. But it means you might reach a threshold. You might have to make a choice about which version of reality to inhabit."
      You meet her eyes. "And your choice might not align with mine."
      The words hang in the air between you. The possibility that you might end up in different versions of reality.
choices:
  - text: "Discuss creating distance to protect her"
    goto: ch24_distance_discussion
    set:
      mira_conversation: 1
      protection_interest: 1
  - text: "Discuss supporting her through the development"
    goto: ch24_support_discussion
    set:
      mira_conversation: 1
      support_interest: 1
