id: ch39_chapter_end
content:
  - type: text
    value: |
      The chapter ends with the endgame complete. The transformation is finalized—the new configuration of reality is permanent, the enhanced accessibility of multiplicity irreversible.
      Sava confirmed that the legal battle established your rights, the threshold gave you the freedom to choose, the convergence transformed reality, and the endgame has finalized everything.
      You can now live your life in the version you chose, with the enhanced accessibility of multiplicity as a permanent feature of reality.
  - type: pause
    duration: 1000
  - type: text
    value: |
      Mira can now live her life in the version she chose, with the enhanced accessibility of multiplicity as a permanent feature of reality.
      The transformation is complete. The new configuration of reality is permanent.
  - type: pause
    duration: 800
  - type: text
    value: |
      Mira is still your anchor. If you stayed, she's building a life with you, your love enduring through the years, the threshold, the convergence, the completed endgame.
      If you shifted, she's building a life in this version while you build yours in another, connected across the multiplicity by the love you share.
  - type: pause
    duration: 1000
  - type: text
    value: |
      Dr. Kaczmarek is still your ally—checking in on you, supporting your journey, going against the system he works for.
      He believes in understanding. He believes your perception is real. He's willing to help you find answers.
  - type: pause
    duration: 800
  - type: text
    value: |
      Sava Illich has been your guide through the threshold—helping you understand your perception, navigate the choice, live with the consequences.
      Now she's confirmed that the endgame is complete, the transformation finalized, the new configuration of reality permanent.
  - type: pause
    duration: 1000
  - type: text
    value: |
      This is the conclusion of the convergence phase. Identity is crystallized. The cracks in reality have widened. The system has restructured and stabilized.
      The endgame is complete—and the transformation is finalized.
choices:
  - text: "Continue to Chapter 40"
    goto: chapter_40
    set:
      chapter_39_completed: 1
