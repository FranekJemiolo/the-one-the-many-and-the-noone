id: ch7_resistance_contact
content:
  - type: text
    value: |
      The medical tests begin the next day. MRI scans, cognitive assessments, neurological evaluations.
      Dr. Kaczmarek is thorough, methodical, running every test he can think of to understand what's happening in your brain.
  - type: pause
    duration: 800
  - type: text
    value: |
      "The MRI shows nothing unusual," Dr. Kaczmarek says, reviewing the results. "Your brain structure is normal. No tumors, no lesions, no abnormalities."
      "I told you. There's nothing wrong with my brain."
      "I believe you. But the tests should have shown something if this were neurological. They didn't."
  - type: pause
    duration: 800
  - type: text
    value: |
      He turns to the cognitive assessment results. "Your cognitive function is... interesting. Your memory is exceptional. Your pattern recognition is above average. Your ability to perceive multiple possibilities is significantly higher than the norm."
      "Is that bad?"
      "No. It's unusual, but not bad. It suggests your brain is processing information differently, not incorrectly."
  - type: pause
    duration: 1000
  - type: text
    value: |
      "So what's the diagnosis?"
      Dr. Kaczmarek considers this. "I don't have one. Not in the traditional sense. Your brain is healthy. Your cognitive function is enhanced, not impaired."
      He pauses. "But your perception of reality is fundamentally different from the norm. That creates problems in a society that requires everyone to perceive reality the same way."
  - type: pause
    duration: 800
  - type: text
    value: |
      "So the problem isn't me. It's society."
      "The problem is the mismatch between your abilities and the system's requirements. You're perceiving multiple realities. The system requires singular perception."
      He meets your eyes. "I want to help you find a way to work with your abilities rather than against them. But I need your cooperation."
  - type: pause
    duration: 1000
  - type: text
    value: |
      "What kind of cooperation?"
      "I want to document your perception. I want to understand how it works, what it can do, whether it can be channeled productively."
      He pauses. "In exchange, I'll advocate for you with the company. I'll argue that your abilities are an asset, not a liability."
  - type: pause
    duration: 800
  - type: text
    value: |
      This is unexpected. You expected dismissal, demands for conformity, threats of termination.
      Instead, Dr. Kaczmarek is offering a partnership. A way to work within the system while developing your abilities.
      "Why?" you ask. "Why help me instead of just dismissing me as delusional?"
  - type: pause
    duration: 1000
  - type: text
    value: |
      "Because I've seen this before," he says. "Not exactly like this. But similar. People whose perception of reality doesn't match the norm."
      He writes something in his notebook. "Most of them were dismissed. Labeled insane. Institutionalized. Lost."
      "But some... some found ways to use their perception. To do things normal people couldn't do."
choices:
  - text: "Accept the partnership and cooperate with documentation"
    goto: ch7_partnership_accepted
    set:
      dr_kaczmarek_trust: 50
      institutional_pressure: 30
  - text: "Refuse, suspicious of his motives"
    goto: ch7_partnership_refused
    set:
      dr_kaczmarek_trust: 10
      aleksy_detachment: 70
