id: ch36_chapter_end
content:
  - type: text
    value: |
      The chapter ends with the endgame approaching. The convergence has stabilized, and now the final phase of the transformation is beginning.
      Sava explained that the endgame will finalize the system's adaptation to multiplicity, making the new configuration of reality permanent.
      The legal battle established your rights. The threshold gave you the freedom to choose. The convergence transformed reality. Now the endgame will finalize everything.
  - type: pause
    duration: 1000
  - type: text
    value: |
      Sava assured you that the endgame is a system-level transformation—you've already made your choices, you've already adapted to the new configuration.
      The endgame is about the system, not about you. You've done your part. Now the system will do its part.
  - type: pause
    duration: 800
  - type: text
    value: |
      After the endgame, the transformation will be complete. The new configuration of reality will be permanent. Multiplicity will be fully accommodated.
      You'll be able to live your life in the version you chose, with the enhanced accessibility of multiplicity as a permanent feature of reality.
  - type: pause
    duration: 1000
  - type: text
    value: |
      Mira is still your anchor. If you stayed, she's building a life with you, your love enduring through the years, the threshold, the convergence, the approaching endgame.
      If you shifted, she's building a life in this version while you build yours in another, connected across the multiplicity by the love you share.
  - type: pause
    duration: 800
  - type: text
    value: |
      Dr. Kaczmarek is still your ally—checking in on you, supporting your journey, going against the system he works for.
      He believes in understanding. He believes your perception is real. He's willing to help you find answers.
  - type: pause
    duration: 1000
  - type: text
    value: |
      Sava Illich has been your guide through the threshold—helping you understand your perception, navigate the choice, live with the consequences.
      Now she's warning you about the endgame—the final phase of the transformation that will make the new configuration of reality permanent.
  - type: pause
    duration: 800
  - type: text
    value: |
      This is the continuation of the convergence phase. Identity is crystallizing. The cracks in reality have widened. The system has restructured and stabilized.
      The endgame is approaching—and it will finalize everything.
choices:
  - text: "Continue to Chapter 37"
    goto: chapter_37
    set:
      chapter_36_completed: 1
