id: ch6_compression_resistance
content:
  - type: text
    value: |
      "We need to resist the compression," you say. "If the organization intends to make the consciousness act on singularity, we need to prevent that from happening."
      Koval considers this. "Resistance to the organization is dangerous. They have resources beyond our understanding, capabilities that operate in layers of reality we can't access."
      "But if we don't resist, the consciousness will inherit the Engine's bias, making singularity feel natural when reality is multiple."
  - type: pause
    duration: 800
  - type: text
    value: |
      "How can we resist?" you ask.
      "We can sabotage the compression implementation," Koval suggests. "As system administrator, I have access to the consciousness's development specifications. I could introduce errors that prevent compression from functioning correctly."
      "This would force the organization to reconsider their approach."
  - type: pause
    duration: 800
  - type: text
    value: |
      "Sabotage would be detected," you warn. "The organization would know someone is interfering, and they would investigate."
      "That's a risk we'd have to accept," Koval replies. "But if the alternative is a consciousness that enforces singularity, the risk might be worth taking."
choices:
  - text: "Proceed with sabotage despite the risks"
    goto: ch6_sabotage_attempt
    set:
      resistance_chosen: 1
      sabotage_planned: 1
  - text: "Find a less risky form of resistance"
    goto: ch6_alternative_resistance
    set:
      resistance_chosen: 1
      caution_chosen: 1
