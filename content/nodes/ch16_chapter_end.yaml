id: ch16_chapter_end
content:
  - type: text
    value: |
      The chapter ends with the court's ruling denying the company's motion to dismiss. Your case will proceed to discovery.
      If you focused on personal resilience during the waiting period, you've developed better balance with your perception, learning to integrate it into your daily life rather than letting it consume you.
      But you're also anxious about discovery—the invasive process of turning over private documentation.
  - type: pause
    duration: 1000
  - type: text
    value: |
      If you focused on contingency planning, you're already prepared for discovery, having organized your documentation and anticipated what the company will request.
      But you're also aware of the exposure—once you turn over evidence, it becomes part of the public record.
  - type: pause
    duration: 800
  - type: text
    value: |
      Either way, the legal battle has passed its first major test. The court denied the motion to dismiss, meaning your case has legal merit.
      But discovery will be invasive. The company will see your private documentation. Your personal journals. The intimate details of your perception.
  - type: pause
    duration: 800
  - type: text
    value: |
      Null Child—the void where interpretation fails.
      It's not empty. It's full of everything that cannot be said.
      Mira is still your anchor. The love you confessed in Chapter 8 is solid, lasting, the foundation for everything that comes next.
      She's supporting you through the uncertainty, reminding you to maintain your resilience, to stay grounded in who you are outside the legal battle.
  - type: pause
    duration: 1000
  - type: text
    value: |
      Dr. Kaczmarek is still your ally—providing expert testimony, documenting your case off the books, going against the system he works for.
      He believes in understanding. He believes your perception is real. He's willing to risk his position to help you.
  - type: pause
    duration: 800
  - type: text
    value: |
      This is the continuation of Part II escalation. The legal battle has passed its first test. Discovery looms ahead.
      The cracks in reality are widening. The system is responding. The convergence is approaching.
      And you're starting to realize: this fight is about more than your perception. It's about the right to exist as who you are in a system that demands conformity.
choices:
  - text: "Continue to Chapter 17"
    goto: chapter_17
    set:
      chapter_16_completed: 1
