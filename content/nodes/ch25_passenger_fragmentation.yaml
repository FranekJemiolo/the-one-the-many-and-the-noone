id: ch25_passenger_fragmentation
content:
  - type: text
    value: "You observe the Passenger fragmentation. Like the Witness and Teacher, the Passenger is fragmenting into multiple versions under system collapse pressure."
  - type: pause
    duration: 800
  - type: text
    value: "Passenger A arrives at destination B. Passenger B arrives at destination C. Passenger C arrives at both simultaneously. All are the same Passenger, but all are different versions."
  - type: pause
    duration: 800
  - type: text
    value: "This is not a navigation error. The Passenger is aware of all trajectories. The Passenger is simply existing in multiple movement states simultaneously."
  - type: pause
    duration: 1000
  - type: text
    value: "You realize this continues the pattern. Under system collapse, identity does not remain singular. Identity becomes multiplicity patterns that contain multiple versions simultaneously."
choices:
  - text: "Understand the trajectory multiplicity"
    goto: ch25_trajectory_multiplicity
