id: ch6_chapter_end
content:
  - type: text
    value: |
      The chapter ends with you leaving Dr. Kaczmarek's office, the institutional pressure now more defined.
      If you accepted medical leave, you're entering a period of evaluation—tests, interviews, attempts to understand what's happening in your brain.
      But Dr. Kaczmarek didn't dismiss you. He took your perception seriously. That's something.
  - type: pause
    duration: 1000
  - type: text
    value: |
      If you refused medical leave, you're continuing to work, continuing to develop your perception while the system watches.
      The collision between your abilities and the system's requirements is inevitable. It's only a matter of time.
  - type: pause
    duration: 800
  - type: text
    value: |
      Either way, Dr. Kaczmarek is now part of your story. The institutional mind, the rational integrator, the one who wants to understand rather than dismiss.
      He may be an ally. He may be an adversary. For now, he's simply a question mark.
  - type: pause
    duration: 800
  - type: text
    value: |
      Mira is still with you, still supporting you, still anchoring you while your perception fractures.
      But the institutional pressure is real now. The system has noticed. The machinery of normalcy is engaged.
  - type: pause
    duration: 1000
  - type: text
    value: |
      This is the beginning of institutional conflict. The first serious collision between your developing perception and the system that requires everyone to perceive reality the same way.
      It won't be the last. The more you develop your abilities, the more the system will push back—or try to accommodate you.
  - type: pause
    duration: 800
  - type: text
    value: |
      Dr. Kaczmarek didn't dismiss you. He took your perception seriously.
      That's something—maybe everything.
choices:
  - text: "Continue to Chapter 7"
    goto: chapter_7
    set:
      chapter_6_completed: 1
