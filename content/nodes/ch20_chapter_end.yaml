id: ch20_chapter_end
content:
  - type: text
    value: |
      This is the end of Part II. The legal battle is won. The precedent is set. The rights are established.
      If you chose to meet Sava Illich, you're entering a new phase of understanding your perception—meeting an independent researcher who studies unusual perception without institutional bias.
      The meeting suggests that reality is multiple, that your perception is evolving to access that multiplicity, that you're not broken but changing.
  - type: pause
    duration: 1000
  - type: text
    value: |
      If you chose to focus on your life with Mira, you're moving forward with the person who has been your anchor throughout the journey.
      The legal battle established your rights. Now you're establishing your life—building a future with Mira, living without constant conflict.
  - type: pause
    duration: 800
  - type: text
    value: |
      Either way, the journey has changed you. You're more confident, more resilient, more sure of who you are.
      But you're also more guarded, more strategic, more aware of the cost of fighting for your right to exist.
  - type: pause
    duration: 800
  - type: text
    value: |
      Mira is still your anchor. The love you confessed in Chapter 8 is solid, lasting, the foundation for everything that comes next.
      She's reminding you not to lose the parts of yourself that made you worth fighting for—the kindness, the curiosity, the capacity to love.
  - type: pause
    duration: 1000
  - type: text
    value: |
      Dr. Kaczmarek is still your ally—providing expert testimony, documenting your case off the books, connecting you with resources.
      He believes in understanding. He believes your perception is real. He's willing to help you explore it further if you choose.
  - type: pause
    duration: 800
  - type: text
    value: |
      This is the conclusion of Part II. The institutional conflict is resolved in your favor. The precedent is set.
      The cracks in reality are widening. The system is responding. The convergence is approaching.
      Part III will bring new challenges—deeper exploration of perception, the introduction of Sava Illich as a mirror, the convergence of multiple timelines.
      Aleksy Wrona. That's your name. That's who you are supposed to be.
      But you're starting to realize that who you are is more complicated than that.
      And with Mira by your side, you're starting to think that might be okay.
choices:
  - text: "Continue to Chapter 21"
    goto: chapter_21
    set:
      chapter_20_completed: 1
