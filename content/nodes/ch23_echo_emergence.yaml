id: ch23_echo_emergence
content:
  - type: text
    value: |
      During your third meeting with Sava, she asks about Mira. "Tell me about your relationship. How is she handling your perception development?"
      "She's been supportive. She's my anchor. She's the reason I want to stay in this version."
      Sava nods. "That's good. But perception development affects close contacts. Has she experienced any changes?"
  - type: pause
    duration: 800
  - type: text
    value: |
      You think about this. "She mentioned something—about having dreams that feel like memories. About experiencing moments that didn't happen in this version."
      "Resonant perception," Sava says. "Your perception is spreading to her. She's starting to access the multiplicity through your connection."
      She pauses. "This is common in documented cases. Close contacts often develop perception similar to the primary case."
  - type: pause
    duration: 800
  - type: text
    value: |
      "Is that dangerous?"
      "Not necessarily. But it creates a complication. If Mira develops her own perception, she might reach her own threshold. She might have to make her own choice about which version to inhabit."
      She meets your eyes. "And her choice might not align with yours."
  - type: pause
    duration: 1000
  - type: text
    value: |
      "What do you mean?"
      "She might choose to shift to a version where her perception is the norm. Or she might choose to stay here, even if you shift elsewhere."
      She pauses. "The connection that anchors you to this version could become the connection that pulls you apart."
choices:
  - text: "Ask how to prevent Mira from developing perception"
    goto: ch23_prevention_approach
    set:
      sava_relationship: 1
      protection_interest: 1
  - text: "Ask how to support Mira if she develops perception"
    goto: ch23_support_approach
    set:
      sava_relationship: 1
      support_interest: 1
