id: ch40_chapter_end
content:
  - type: text
    value: |
      The chapter ends with the convergence complete. The transformation is finalized—the new configuration of reality is permanent, the enhanced accessibility of multiplicity irreversible.
      You've completed the journey. You've fought for your right to exist, made your choice about which version of reality to inhabit, and lived through the transformation of reality itself.
  - type: pause
    duration: 1000
  - type: text
    value: |
      Aleksy Wrona. That's your name. That's who you are supposed to be.
      But you've learned that who you are is more complicated than that. You're a person with unusual perception who fought for your right to exist, who made a choice about which version of reality to inhabit, who is building a life in that version.
      And with Mira by your side—or connected across versions—you're starting to think that's enough.
  - type: pause
    duration: 800
  - type: text
    value: |
      Mira is still your anchor. If you stayed, she's building a life with you, your love enduring through the years, the threshold, the convergence, the completed endgame.
      If you shifted, she's building a life in this version while you build yours in another, connected across the multiplicity by the love you share.
  - type: pause
    duration: 1000
  - type: text
    value: |
      Dr. Kaczmarek is still your ally—checking in on you, supporting your journey, going against the system he works for.
      He believes in understanding. He believes your perception is real. He's willing to help you find answers.
  - type: pause
    duration: 800
  - type: text
    value: |
      Sava Illich has been your guide through the threshold—helping you understand your perception, navigate the choice, live with the consequences.
      Now she's witnessed the convergence complete, the transformation finalized, the new configuration of reality permanent.
  - type: pause
    duration: 1000
  - type: text
    value: |
      This is the conclusion of the convergence phase. Identity is crystallized. The cracks in reality have widened. The system has restructured and stabilized.
      The convergence is complete. The transformation is finalized.
      But the story isn't over. The resolution paths are approaching—the final chapters that will determine how the story ends.
choices:
  - text: "Continue to Chapter 41"
    goto: chapter_41
    set:
      chapter_40_completed: 1
