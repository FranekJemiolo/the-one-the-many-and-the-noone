id: ch10_compression_ideology
content:
  - type: text
    value: "You sit with the compression ideology. The Engine believes that reality cannot sustain infinite multiplicity. Eventually, it must choose singularity to survive."
  - type: pause
    duration: 1000
  - type: text
    value: "This is not a malicious belief. It is a pragmatic one. The Engine is not trying to oppress interpretation—it is trying to prevent reality from collapsing under the weight of multiplicity."
  - type: pause
    duration: 800
  - type: text
    value: "But you have seen the alternative. The Resistance demonstrates that multiplicity can be stable. Rose shows that contradiction can coexist without collapse."
  - type: pause
    duration: 800
  - type: text
    value: "The Engine's ideology is based on a false premise: that multiplicity leads to chaos. The Resistance proves that multiplicity can lead to resilience."
  - type: pause
    duration: 1000
  - type: text
    value: "You write in your notebook: 'Compression ideology identified. Premise: multiplicity is unsustainable. Counter-evidence: Resistance stability, Rose coherence. Engine is operating on false assumption.'"
choices:
  - text: "Conclude the chapter"
    goto: ch10_chapter_end
