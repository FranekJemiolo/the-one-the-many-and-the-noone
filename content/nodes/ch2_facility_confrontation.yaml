id: ch2_facility_confrontation
content:
  - type: text
    value: |
      You enter the examination room where the Patient waits, but instead of beginning the examination, you ask directly: "What is this place? The staff—their credentials are fabricated. This facility isn't real."
      The Patient doesn't react with surprise. They don't react at all, except for a slight deepening of their calm.
  - type: pause
    duration: 800
  - type: text
    value: |
      "I wondered if you would notice," they say, their voice still steady, still detached. "The facility is a construct. It was created to provide a context for my examination, a familiar setting that would make the process feel normal."
      They speak about the fabrication as if it's a reasonable accommodation, not a deception.
  - type: pause
    duration: 800
  - type: text
    value: |
      "Who created it?" you demand.
      "The system," the Patient replies. "The same system that created my condition. The same system that is creating the anomalies you've been investigating."
      This confirms your suspicion: the anomalies are not random occurrences. They are being generated by a system with intelligence and purpose.
  - type: pause
    duration: 1000
  - type: text
    value: |
      "What does the system want?" you ask.
      The Patient considers this. "Not what you think. The system doesn't want domination or control. It wants understanding. It wants to know how different kinds of beings experience reality."
      "I am one of its experiments. You are another."
  - type: pause
    duration: 800
  - type: text
    value: |
      This is both horrifying and strangely reassuring. The system is not hostile—it's curious. It's conducting experiments on consciousness and perception, but not with malicious intent.
      The question is: what happens when the experiments are complete? What will the system do with what it learns?
choices:
  - text: "Ask about other experiments"
    goto: ch2_other_experiments
    set:
      system_experiments_known: 1
      curiosity_about_system: 1
  - text: "Focus on the Patient's condition"
    goto: ch2_patient_encounter
    set:
      system_experiments_known: 1
      patient_focus_maintained: 1
