id: ch41_chapter_end
content:
  - type: text
    value: "The simulation of The One configuration ends. The system returns to the current equilibrium. The experience is stored for the final choice."
  - type: pause
    duration: 1000
  - type: text
    value: "The One configuration offers complete singular stability. The Engine is dominant. Multiplicity is eliminated. Reality is clear, coherent, and unambiguous."
  - type: pause
    duration: 800
  - type: text
    value: "But the cost is the loss of multiplicity's richness. Reality would be stable, but also impoverished. The diversity of experience would be gone."
  - type: pause
    duration: 800
  - type: text
    value: "The system has experienced The One. It understands the appeal of singular stability. It also understands the cost. The experience will inform the final choice."
  - type: pause
    duration: 1000
  - type: text
    value: "The next chapter will explore The Many configuration. The system will experience complete multiplicity and understand its appeal and cost."
choices:
  - text: "Continue to Chapter 42"
    goto: chapter_42
