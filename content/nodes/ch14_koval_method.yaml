id: ch14_koval_method
content:
  - type: text
    value: |
      A week after you make your choice about legal strategy, you receive a letter from the company. It's not a legal document—it's a personal letter from your former supervisor.
      "I wanted to reach out personally," she writes. "To say that I'm sorry about how this ended. I didn't want this to happen."
  - type: pause
    duration: 800
  - type: text
    value: |
      "I tried to advocate for you. I tried to convince HR that you were an asset, not a liability. But they wouldn't listen. They were too focused on risk, too concerned about liability."
      She pauses in the letter. "I don't know if this matters, but I wanted you to know. I respected your work. I still do."
  - type: pause
    duration: 800
  - type: text
    value: |
      You show the letter to Mira. "She tried to help."
      "That's good. It means not everyone at the company saw you as a liability."
      She pauses. "But it doesn't change what happened. They still pushed you out. They still erased you."
  - type: pause
    duration: 1000
  - type: text
    value: |
      "I know. But it helps to know that at least one person saw me as a person, not a risk."
      You think about calling your former supervisor, but you don't. What would you say? What would it accomplish?
      The letter is enough. It's a small kindness in the middle of institutional erasure.
  - type: pause
    duration: 800
  - type: text
    value: |
      Dr. Kaczmarek calls that evening. "I heard about the letter. It's good that someone reached out."
      "It doesn't change anything."
      "No. But it humanizes the conflict. It reminds you that the system is made of people, not just faceless institutions."
      He pauses. "That's important. Because when you fight the system, it's easy to forget that there are real people on the other side."
choices:
  - text: "Respond to the letter, maintain the connection"
    goto: ch14_letter_response
    set:
      institutional_pressure: 55
      human_connection: 1
  - text: "Ignore the letter, focus on the fight"
    goto: ch14_fighting_focus
    set:
      institutional_pressure: 65
      legal_conflict: 1
