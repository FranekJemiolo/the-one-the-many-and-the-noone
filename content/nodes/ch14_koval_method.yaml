id: ch14_koval_method
content:
  - type: text
    value: |
      Dr. Koval explains her method, her voice calm as she describes an approach to truth that would be considered heretical in normal contexts. "The system cannot tolerate too much ambiguity. When truth is too complex, when the actual reality would cause the system to collapse, I provide a controlled falsehood that stabilizes the system."
      She speaks as if this is the most natural thing in the world, as if managing truth is simply another form of system maintenance.
  - type: pause
    duration: 800
  - type: text
    value: |
      She is not lying maliciously, not trying to deceive for personal gain or to hide wrongdoing. She is managing reality, making deliberate choices about which version of truth to allow into the system.
      The falsehood is not random, not arbitrary—it is designed to produce system stability, to allow the system to continue functioning when the actual truth would be too complex to process.
  - type: pause
    duration: 800
  - type: text
    value: |
      "The truth is still there," Dr. Koval says, and there is a certainty in her voice that suggests she has explained this many times. "It is just not the active interpretation. The system is running on the falsehood, but the truth remains accessible if needed.
      I am not destroying truth. I am temporarily replacing it with something the system can handle."
  - type: pause
    duration: 1000
  - type: text
    value: |
      This is a form of controlled distortion. Dr. Koval is not eliminating truth, not pretending that falsehood is reality. She is layering a stabilizing falsehood over a destabilizing truth, creating a temporary interpretation that allows the system to function.
      The truth remains in the background, preserved even while it is not being actively used, accessible when the system is ready to handle its complexity.
choices:
  - text: "Understand truth as a variable"
    goto: ch14_truth_as_variable
  - text: "Ask about Koval's ethical framework"
    goto: ch14_koval_ethics
    set:
      ethics_interest: 1
