id: ch40_final_configuration_options
content:
  - type: text
    value: "You observe the final configuration options. The five canonical endings represent different philosophical positions about the nature of reality."
  - type: pause
    duration: 800
  - type: text
    value: "The One represents the belief that reality should be singular. The Many represents the belief that reality should be multiple. The No-One represents the belief that reality should be void."
  - type: pause
    duration: 800
  - type: text
    value: "The Overlap represents the belief that reality should be balanced between singular and plural. The Shifting World represents the belief that reality should remain in perpetual motion."
  - type: pause
    duration: 1000
  - type: text
    value: "You realize this is not just a choice of configuration. It is a choice of philosophy. The system's final configuration will represent its philosophical position about the nature of reality."
choices:
  - text: "Observe the endgame approaches"
    goto: ch40_endgame_approaches
