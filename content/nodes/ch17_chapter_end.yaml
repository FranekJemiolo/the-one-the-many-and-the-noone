id: ch17_chapter_end
content:
  - type: text
    value: |
      The chapter ends with discovery in progress.
      If you turned over your journals, you've accepted the exposure—sacrificing privacy for the chance to win the case.
      But you're also thinking about the precedent, about making it easier for the next person who won't have to make this choice.
  - type: pause
    duration: 1000
  - type: text
    value: |
      If you refused to turn over your journals, you're fighting to protect your privacy—filing a motion to keep certain documents private, arguing that personal thoughts aren't relevant evidence.
      But you're also risking the case, knowing the court may not agree with your position.
  - type: pause
    duration: 800
  - type: text
    value: |
      Either way, discovery is invasive. The company has turned over their internal documents, and you've had to turn over yours.
      The legal battle is no longer abstract—it's about real evidence, real documents, real exposure.
  - type: pause
    duration: 800
  - type: text
    value: |
      Identity is crystallizing—not into a single form, but into named multiplicities.
      Echo, Barrier, Archive, Drift—patterns becoming entities.
      Mira is still your anchor. The love you confessed in Chapter 8 is solid, lasting, the foundation for everything that comes next.
      She's supporting you through the invasive process, reminding you that your dignity matters regardless of the outcome.
  - type: pause
    duration: 1000
  - type: text
    value: |
      Dr. Kaczmarek is still your ally—providing expert testimony, documenting your case off the books, going against the system he works for.
      He believes in understanding. He believes your perception is real. He's willing to risk his position to help you.
  - type: pause
    duration: 800
  - type: text
    value: |
      This is the continuation of Part II escalation. Discovery is ongoing. The legal battle is invasive.
      The cracks in reality are widening. The system is responding. The convergence is approaching.
      And you're starting to realize: this fight is about more than your perception. It's about the right to exist as who you are in a system that demands conformity.
choices:
  - text: "Continue to Chapter 18"
    goto: chapter_18
    set:
      chapter_17_completed: 1
