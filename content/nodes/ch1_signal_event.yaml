id: ch1_signal_event
content:
  - type: text
    value: |
      Cold. The kind that settles in bones and doesn't leave. You are crouched on something high—a branch, a ledge, something that offers perspective.
      Below, movement. Small, frantic, unaware of being watched.
  - type: pause
    duration: 1000
  - type: text
    value: |
      Your focus narrows. Everything else falls away. There is only the movement, the timing, the moment when everything depends on one precise action.
      Your muscles coil. Your breathing slows. This is not thought. This is older than thought.
  - type: pause
    duration: 800
  - type: text
    value: |
      You strike.
  - type: pause
    duration: 500
  - type: text
    value: |
      And miss.
  - type: pause
    duration: 1000
  - type: text
    value: |
      The failure is not physical. You were close enough. Fast enough. The timing was perfect.
      But something shifted at the last moment—not the prey, not the wind, not the light. The moment itself changed.
  - type: pause
    duration: 800
  - type: text
    value: |
      You wake up.
  - type: pause
    duration: 500
  - type: text
    value: |
      The office is quiet. Fluorescent lights hum above your desk. Your computer screen glows with unfinished work—lines of text you don't remember writing.
      Aleksy Wrona. That's your name. That's who you are supposed to be.
  - type: pause
    duration: 1000
  - type: text
    value: |
      But the memory of the hunt is still with you. The cold. The focus. The impossible failure.
      And something else—a recognition, as if you've missed that strike before, in another life, as something that wasn't human at all.
  - type: pause
    duration: 800
  - type: text
    value: |
      You rub your eyes, trying to shake the feeling. It was just a dream. It had to be a dream.
      But your hands are still trembling, and when you look at them, you notice something unsettling—you were gripping the edge of your desk so hard your knuckles are white.
      As if you'd been holding on to something high, something precarious, something that required absolute stillness.
choices:
  - text: "Try to understand what the memory means"
    goto: ch1_self_reflection
    set:
      aleksy_fracture_level: 5
      animal_pov_access: true
  - text: "Dismiss it and focus on work"
    goto: ch1_building_exploration
    set:
      aleksy_detachment: 5
  - text: "Call Mira"
    goto: ch1_mira_introduction
    set:
      relationship_focus: true
