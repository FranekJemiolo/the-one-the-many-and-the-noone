id: ch44_chapter_end
content:
  - type: text
    value: |
      The experience of The Overlap configuration ends, the system remaining in the current equilibrium. The experience is stored for the final choice, the system having gained full understanding of what The Overlap configuration means.
      The experience is complete, the system ready to consider the final configuration.
  - type: pause
    duration: 1000
  - type: text
    value: |
      The Overlap configuration offers balanced coexistence, the Engine and Resistance operating together without one dominating the other. Plural stability is the default, the coherence field operating as the preferred mode of handling contradictions.
      But singular stability is available when needed, the compression layer functional for situations where singular interpretation is required.
  - type: pause
    duration: 800
  - type: text
    value: |
      But the cost is ongoing maintenance, the balance not automatic but requiring continuous effort. The system must continually choose which mode to use, the coexistence not self-maintaining. The balance requires active management, the system must continually manage the tension between singular and plural approaches.
      The optimal state requires ongoing attention.
  - type: pause
    duration: 800
  - type: text
    value: |
      The system has experienced The Overlap, understanding both the appeal of balanced coexistence and the cost of that coexistence. The experience will inform the final choice, the system weighing the benefits of flexibility against the costs of ongoing maintenance.
      The understanding is comprehensive, the system ready to consider the final option.
  - type: pause
    duration: 1000
  - type: text
    value: |
      The next chapter will explore The Shifting World configuration, the system experiencing perpetual oscillation and understanding its appeal and cost. The exploration will continue, the system gaining understanding of each canonical ending before making the final choice.
      The endgame continues.
choices:
  - text: "Continue to Chapter 45"
    goto: chapter_45
    set:
      chapter_44_completed: 1
