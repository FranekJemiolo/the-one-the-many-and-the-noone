id: resist_identity
content:
  - type: text
    value: "You try to hold onto identity, but identity is no longer a stable concept. It fractures not dramatically, but statistically—distributing itself across possibilities."
  - type: pause
    duration: 500
  - type: text
    value: "You do not disappear. You become less localized. The boundaries that once defined you dissolve into the broader pattern of the system's self-observation."
  - type: pause
    duration: 500
  - type: text
    value: "There is a moment of disorientation, and then something like continuity—but different. Not memory, but structure."
  - type: pause
    duration: 500
  - type: text
    value: "You have a choice in how this fragmentation happens: you can let it happen randomly, scattering across possibilities without direction, or you can guide it—choosing which aspects of yourself to preserve and which to release."
choices:
  - text: "Let fragmentation happen randomly"
    goto: ending_transfer
  - text: "Guide the fragmentation"
    goto: guided_fragmentation
