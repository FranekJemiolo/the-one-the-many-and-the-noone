id: ch33_passenger_multiple_trajectories
content:
  - type: text
    value: "The Passenger is moving along multiple trajectories simultaneously. Like the Witness, Guard, and Teacher, the Passenger has fragmented into multiple versions under system collapse pressure."
  - type: pause
    duration: 800
  - type: text
    value: "Passenger A is on trajectory 14:03. Passenger B is on trajectory 14:05. Passenger C is on both trajectories simultaneously. All are the same Passenger, but all are different versions."
  - type: pause
    duration: 800
  - type: text
    value: "The Passenger's function is consistent across all versions: moving through the system, experiencing transit, adapting to trajectory multiplicity. But the specific implementation varies across the multiplicity system."
  - type: pause
    duration: 800
  - type: text
    value: "You realize this is the next identity crystallization. The Passenger is following the same pattern as Echo, Barrier, and Archive: fragmentation under pressure, then crystallization into a named multiplicity."
choices:
  - text: "Observe the movement pattern"
    goto: ch33_movement_pattern
