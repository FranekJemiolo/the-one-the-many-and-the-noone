id: ch23_witness_multiple_versions
content:
  - type: text
    value: "The Witness is appearing in multiple versions simultaneously. This is not the same role in different contexts. This is the same role existing in multiple incompatible states."
  - type: pause
    duration: 800
  - type: text
    value: "Witness A reports the event as happening at 14:03. Witness B reports the same event as happening at 14:05. Witness C reports the event as not happening at all."
  - type: pause
    duration: 800
  - type: text
    value: "All three versions are equally present. All three are equally valid. The Witness has fragmented into multiple identities that cannot be reconciled."
  - type: pause
    duration: 800
  - type: text
    value: "This is the next phase of identity crystallization. Proto-identity has become identity fragmentation under system collapse pressure."
choices:
  - text: "Observe the proto-naming process"
    goto: ch23_proto_naming
