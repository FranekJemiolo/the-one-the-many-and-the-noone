id: ch11_emotional_unification
content:
  - type: text
    value: "You focus on the emotional unification. The contradictory memories feel different when examined together."
  - type: pause
    duration: 800
  - type: text
    value: "Memory A (death): grief, loss, finality. Memory B (life): relief, continuation, presence. Both emotional sequences are authentic."
  - type: pause
    duration: 800
  - type: text
    value: "When you hold both memories simultaneously, the emotions do not cancel each other out. They expand into a larger emotional field that contains both grief and relief."
  - type: pause
    duration: 1000
  - type: text
    value: "This is Mira's domain. Emotional truth is not binary. Contradictory emotions can coexist without either being false."
  - type: pause
    duration: 800
  - type: text
    value: "You realize this is what Rose does: allows contradictory truths to coexist emotionally without forcing them to reconcile factually."
choices:
  - text: "Speak with Sister Lys about memory reconciliation"
    goto: ch11_memory_reconciliation
    set:
      rose_coherence: 1
