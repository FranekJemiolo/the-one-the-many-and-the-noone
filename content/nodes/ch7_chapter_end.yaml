id: ch7_chapter_end
content:
  - type: text
    value: |
      The chapter ends with you at a crossroads regarding Dr. Kaczmarek's partnership offer.
      If you accepted, you're entering a period of documentation—regular sessions, tracking your perception, building a case for your value to the company.
      But the question remains: what will Dr. Kaczmarek do with that information?
  - type: pause
    duration: 1000
  - type: text
    value: |
      If you refused, you're facing the system alone. The company is discussing termination. The institutional pressure is intensifying.
      But you still have your autonomy. You still have control over who gets access to your perception.
  - type: pause
    duration: 800
  - type: text
    value: |
      Either way, Dr. Kaczmarek is now a permanent presence in your story. The institutional mind, the rational integrator, the one who wants to understand rather than dismiss.
      Whether he's an ally or an adversary remains to be seen.
  - type: pause
    duration: 800
  - type: text
    value: |
      Mira is still with you, still supporting you, still anchoring you while your perception fractures.
      But the institutional pressure is intensifying. The system is making moves. The clock is ticking.
  - type: pause
    duration: 1000
  - type: text
    value: |
      This is the deepening of institutional conflict. The system is no longer just watching—it's acting.
      HR is involved. Dr. Kaczmarek is involved. Termination is being discussed.
      The collision between your developing perception and the system's requirements is accelerating.
  - type: pause
    duration: 800
  - type: text
    value: |
      The clock is ticking. The system is making moves.
      And you have to decide: give them what they want, or keep your perception to yourself.
choices:
  - text: "Continue to Chapter 8"
    goto: chapter_8
    set:
      chapter_7_completed: 1
