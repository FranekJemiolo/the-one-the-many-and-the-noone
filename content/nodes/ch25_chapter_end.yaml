id: ch25_chapter_end
content:
  - type: text
    value: |
      The chapter ends with the revelation of a timing mismatch—your perception is developing faster than Mira's, meaning you might reach your threshold before she reaches hers.
      If you chose to wait for Mira, you're risking your own stability to maintain your connection.
      The longer you wait at the threshold, the higher the risk of fracture, of identity dissolution, of breaking under the pressure of accessing multiple realities without choosing one.
  - type: pause
    duration: 1000
  - type: text
    value: |
      If you chose to prioritize stability, you're making the strategic choice to protect yourself, even if it means making your choice alone.
      But this comes at a cost—Mira might see it as abandonment, as choosing yourself over her.
      The timing mismatch is forcing you to choose between your stability and your connection.
  - type: pause
    duration: 800
  - type: text
    value: |
      Either way, the threshold is approaching. The choice will have to be made.
      The legal battle established your rights. Now the personal journey is testing your commitment to those rights—and to the person who helped you win them.
  - type: pause
    duration: 800
  - type: text
    value: |
      Mira is still your anchor. The love you confessed in Chapter 8 is solid, lasting, the foundation for everything that comes next.
      But the timing mismatch is creating tension between your stability and your connection.
  - type: pause
    duration: 1000
  - type: text
    value: |
      Dr. Kaczmarek is still your ally—connecting you with Sava, supporting your exploration, going against the system he works for.
      He believes in understanding. He believes your perception is real. He's willing to help you find answers.
  - type: pause
    duration: 800
  - type: text
    value: |
      This is the continuation of Part III. The legal battle is won, but the personal journey continues.
      The cracks in reality are widening. The system is responding. The convergence is approaching.
      And Sava Illich is becoming a mirror—showing you what you're becoming, challenging you to think about your connection to Mira.
choices:
  - text: "Continue to Chapter 26"
    goto: chapter_26
    set:
      chapter_25_completed: 1
