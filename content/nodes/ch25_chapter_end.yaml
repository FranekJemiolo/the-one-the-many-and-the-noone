id: ch25_chapter_end
content:
  - type: text
    value: "You leave the transit system. The Passenger continues to move along multiple trajectories simultaneously. The transit system functions with trajectory multiplicity."
  - type: pause
    duration: 1000
  - type: text
    value: "This is not a breakdown of movement. It is an evolution of transit. The system has adapted to trajectory multiplicity and found a way to function within it."
  - type: pause
    duration: 800
  - type: text
    value: "You realize the Engine's fear is unfounded. Trajectory multiplicity is not chaos. It is a different way of moving that the Engine cannot control, but that functions perfectly well."
  - type: pause
    duration: 800
  - type: text
    value: "The collapse of singular movement has not destroyed transit. It has transformed it into something the Engine cannot recognize as valid, but that works nonetheless."
  - type: pause
    duration: 1000
  - type: text
    value: "This continues the pattern. Oscillation breaks not into chaos, but into new states of multiplicity that the Engine cannot control but that function anyway."
choices:
  - text: "Continue to Chapter 26"
    goto: chapter_26
