id: ch25_trajectory_multiplicity
content:
  - type: text
    value: "You understand the trajectory multiplicity. The transit system is not producing a single path that is being interpreted differently. It is producing multiple paths simultaneously."
  - type: pause
    duration: 800
  - type: text
    value: "This is not a problem with the Passenger's navigation. The movement itself has become multiple. The trajectory contains incompatible paths that are all equally valid."
  - type: pause
    duration: 800
  - type: text
    value: "You realize this is what the Engine fears. Trajectory multiplicity is not chaos. It is a different way of moving that the Engine cannot control, but that functions perfectly well."
  - type: pause
    duration: 1000
  - type: text
    value: "The Passenger is not lost. The Passenger is adapted to trajectory multiplicity. The Passenger moves along multiple paths simultaneously and arrives at multiple destinations as valid."
choices:
  - text: "Conclude the chapter"
    goto: ch25_chapter_end
