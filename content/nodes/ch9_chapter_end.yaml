id: ch9_chapter_end
content:
  - type: text
    value: |
      The chapter ends with you going to sleep, the day of Dr. Kaczmarek's documentation session looming ahead.
      If you explored the alternate self memory, you're shaken by the vision of a version of yourself that faced the system alone—a version that was institutionalized, broken, erased.
      But you're also grateful—grateful that you chose differently, grateful that you have Mira, grateful that you're not facing this alone.
  - type: pause
    duration: 1000
  - type: text
    value: |
      If you pushed the memory away, you're focused on strategy—on managing the relationship with Dr. Kaczmarek, on protecting yourself while building trust.
      You're calculating, careful, prepared for whatever comes next.
  - type: pause
    duration: 800
  - type: text
    value: |
      Either way, the relationship with Mira is solid. She's your anchor, your partner, the one who keeps you grounded while your perception fractures.
      The love you confessed in Chapter 8 is real, lasting, the foundation for everything that comes next.
  - type: pause
    duration: 800
  - type: text
    value: |
      The institutional pressure is still real. Dr. Kaczmarek is still a question mark. The system is still watching.
      But you're not facing it blindly anymore. You have a plan. You have allies. You have love.
  - type: pause
    duration: 1000
  - type: text
    value: |
      This is the end of Part I. The foundation is set. Aleksy as protagonist, Mira as anchor, Dr. Kaczmarek as institutional question mark.
      The perception is developing. The relationship is deepening. The conflict is escalating.
      Part II will bring the next phase—escalation, deeper institutional conflict, the introduction of Sava Illich as your mirror.
  - type: pause
    duration: 800
  - type: text
    value: |
      Aleksy Wrona. That's your name. That's who you are supposed to be.
      But you're starting to realize that who you are is more complicated than that.
      And with Mira by your side, you're starting to think that might be okay.
choices:
  - text: "Continue to Chapter 10"
    goto: chapter_10
    set:
      chapter_9_completed: 1
