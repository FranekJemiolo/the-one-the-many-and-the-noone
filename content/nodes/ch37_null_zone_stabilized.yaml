id: ch37_null_zone_stabilized
content:
  - type: text
    value: |
      The endgame begins. You can feel the transformation accelerating, the system preparing to finalize its adaptation to multiplicity.
      If you chose to stay, you're watching the boundaries between versions become more stable, the enhanced accessibility of multiplicity becoming a permanent feature of reality.
      If you chose to shift, you're watching the connection across versions become more stable, the enhanced accessibility becoming a permanent feature of reality.
  - type: pause
    duration: 800
  - type: text
    value: |
      Either way, the endgame is a system-level transformation. You're witnessing reality finalize its restructuring, the new configuration becoming permanent.
      Sava calls with an update. "The endgame has begun. The system is finalizing its adaptation to multiplicity."
      "What does that look like?"
      "The boundaries between versions are stabilizing. The enhanced accessibility of multiplicity is becoming permanent. The new configuration of reality is locking in."
  - type: pause
    duration: 800
  - type: text
    value: |
      "How long will it take?"
      "Days. Maybe weeks. The transformation is accelerating."
      She pauses. "You should prepare. After the endgame, reality will be permanently restructured. The new configuration will be irreversible."
  - type: pause
    duration: 1000
  - type: text
    value: |
      "I'm prepared. I've been living with this for years."
      "I know. But permanent is different from temporary. After the endgame, there's no going back to the old configuration."
      She meets your eyes. "Are you ready for that?"
choices:
  - text: "Continue to Chapter 38"
    goto: ch37_chapter_end
    set:
      endgame_begun: 1
