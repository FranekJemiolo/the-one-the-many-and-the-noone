id: ch36_compression_maximum
content:
  - type: text
    value: "You observe the compression maximum. Nemesis is applying maximum pressure to collapse all interpretation layers into singularity."
  - type: pause
    duration: 800
  - type: text
    value: "The multiple realities are being forced together. The temporal fields are being compressed into linear time. The named multiplicities are being forced into singular entities."
  - type: pause
    duration: 800
  - type: text
    value: "The resistance is intense. The system is fighting back. The coherence field that has become structural is actively opposing the compression."
  - type: pause
    duration: 1000
  - type: text
    value: "You realize this is not a battle between Nemesis and Rose. This is a battle between the Engine's ideology and the system's demonstrated preference for plural stability."
choices:
  - text: "Observe the system resistance"
    goto: ch36_system_resistance
