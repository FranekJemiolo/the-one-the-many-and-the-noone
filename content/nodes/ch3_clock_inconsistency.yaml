id: ch3_clock_inconsistency
content:
  - type: text
    value: |
      You decide not to commit to the training—not yet. You need more time to understand what's happening to you before you let someone like Vance reshape your perception.
      Mira respects your decision, though you can tell she's disappointed. "Just... keep documenting. Keep watching for patterns. If it gets worse, reconsider."
  - type: pause
    duration: 800
  - type: text
    value: |
      The next day at work, you notice something strange. The clock on your wall—the one you've looked at a thousand times—seems to be behaving differently.
      Not malfunctioning. Not broken. Just... different. As if time itself is operating by rules you never noticed before.
  - type: pause
    duration: 800
  - type: text
    value: |
      You watch it for an hour. The hands move normally, the seconds ticking forward in the expected sequence.
      But sometimes—just for a moment—the time seems to stutter. To hesitate. To exist in two states simultaneously before choosing one.
  - type: pause
    duration: 1000
  - type: text
    value: |
      You check your phone. The time there matches the wall clock—most of the time.
      But occasionally, there's a discrepancy. A second here, a minute there. Small differences that resolve themselves before you can be sure you actually saw them.
  - type: pause
    duration: 800
  - type: text
    value: |
      This is new. The dreams were one thing—memories from other versions of yourself. But this is different.
      This is your perception of time itself changing. The way you experience the present moment shifting.
      If time is operating by rules you don't understand, then what else is different? What else have you been perceiving wrong your entire life?
  - type: pause
    duration: 1000
  - type: text
    value: |
      You call Mira during your lunch break. "I think time is behaving differently around me."
      "How?"
      "Stuttering. Hesitating. Existing in two states at once."
      Silence on the line. Then: "That's temporal perception, Aleksy. That's what Vance was talking about."
  - type: pause
    duration: 800
  - type: text
    value: |
      "I thought I had more time."
      "You don't. Whatever is happening to you, it's accelerating. The dreams are getting more vivid. Now time is behaving differently. What's next?"
      She pauses. "I think you need to reconsider the training. Before this gets beyond your ability to control."
choices:
  - text: "Reconsider and contact Vance"
    goto: ch3_meeting_vance
    set:
      layer_training_commitment: 1
      vance_mentor: 1
      aleksy_fracture_level: 50
  - text: "Continue trying to handle it on your own"
    goto: ch3_chapter_end
    set:
      aleksy_detachment: 35
      layer_training_deferred: 1
