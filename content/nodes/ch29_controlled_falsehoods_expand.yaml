id: ch29_controlled_falsehoods_expand
content:
  - type: text
    value: |
      You observe that Dr. Koval's controlled falsehoods have expanded from a local technique to a system architecture. What began as a specific method for managing complex truths in individual situations has evolved into a fundamental structure of the entire system.
      The expansion is complete, the layered interpretation now operating at the system level.
  - type: pause
    duration: 800
  - type: text
    value: |
      The system is now operating on multiple layers simultaneously, no longer forced to choose between truth and compression. The active layer is a controlled falsehood that provides stability, satisfying the Engine's need for singular interpretation.
      The background layer contains the truth that the falsehood is based on, preserving the full complexity of reality.
  - type: pause
    duration: 800
  - type: text
    value: |
      This is not deception, not a trick where the system hides the truth behind false narratives. The system is aware of the falsehood, knows that the active interpretation is a compression rather than the full truth.
      The falsehood is a chosen interpretation that allows the system to function while preserving the truth in the background.
  - type: pause
    duration: 800
  - type: text
    value: |
      You realize this is what happens when the Engine's compression pressure becomes overwhelming. The system adapts by layering interpretations rather than choosing one, creating a structure that accommodates both compression and truth.
      The adaptation is structural, not temporary—a fundamental reorganization of how the system operates.
choices:
  - text: "Observe the truth layers"
    goto: ch29_truth_layers
