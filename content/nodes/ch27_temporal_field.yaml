id: ch27_temporal_field
content:
  - type: text
    value: |
      You understand the temporal field, seeing how time has transformed in the boundary zone. Time is not a line in the boundary zone, not a single directed sequence where past leads to present leads to future.
      It is a field of causal loops that operate in self-consistent patterns, events related through circular causality rather than linear sequence.
  - type: pause
    duration: 800
  - type: text
    value: |
      This is not a breakdown of time, not a failure of temporal systems. It is an evolution of time, a transformation into a different mode of temporality. The system has adapted to temporal multiplicity by allowing causality to operate in loops rather than lines.
      The adaptation is complete, the transformation successful.
  - type: pause
    duration: 800
  - type: text
    value: |
      You realize this is what the Engine fears. Temporal fields are not chaos, not the breakdown of causality into disorder. They are a different way of experiencing time that the Engine cannot control, but that functions perfectly well.
      The Engine's assumption that time must be linear is proven wrong by the very existence of functional temporal fields.
  - type: pause
    duration: 1000
  - type: text
    value: |
      Kai is not confused, not disoriented by the collapse of linear time. Kai is adapted to the temporal field, their consciousness restructured to accommodate causal loops.
      Kai exists in causal loops the way people in linear time exist in causal lines, the circular causality feeling as natural as linear sequence once did.
choices:
  - text: "Conclude the chapter"
    goto: ch27_chapter_end
  - text: "Ask about insights from causal loops"
    goto: ch27_loop_insight
    set:
      loop_insight_interest: 1
