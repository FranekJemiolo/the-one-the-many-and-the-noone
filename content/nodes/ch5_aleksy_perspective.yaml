id: ch5_aleksy_perspective
content:
  - type: text
    value: |
      You approach the problem causally, your mind trained to seek the single thread of truth that must exist beneath the surface of contradiction. If two people remember the same moment differently, one of them must be wrong.
      Memory is a record of what happened, and what happened is singular. There cannot be two different versions of the same moment.
  - type: pause
    duration: 800
  - type: text
    value: |
      You reconstruct the sequence from your memory: light changes, you respond about time. This is the logical chain. Light change precedes time reference. Causality is preserved.
      The sequence makes sense—the observation of light changing naturally leads to a comment about time, about how the shifting light marks the passage of the afternoon.
  - type: pause
    duration: 800
  - type: text
    value: |
      But Mira's memory is equally coherent: feeling of room, you respond about emotional weight. This is also a logical chain. Feeling precedes emotional reference.
      Her sequence makes sense too—the observation of the room's feeling naturally leads to a comment about emotional weight, about how the atmosphere carries something unsaid.
  - type: pause
    duration: 1000
  - type: text
    value: |
      The problem is not that one memory is wrong. The problem is that both memories are causally consistent within their own frameworks. Both sequences follow logical cause-and-effect patterns.
      Neither memory contains a logical error, neither contains a temporal impossibility, neither feels like a misremembering.
  - type: pause
    duration: 800
  - type: text
    value: |
      You realize this is not a memory error. It is a causal divergence. The same moment produced two different causal chains, and both are equally valid.
      The moment itself contains multiple versions, and different observers access different versions depending on their interpretive framework.
choices:
  - text: "Compare with Mira's emotional perspective"
    goto: ch5_mira_perspective
  - text: "Compare the memories directly"
    goto: ch5_memory_comparison
