id: ch29_koval_strategy
content:
  - type: text
    value: |
      Dr. Koval explains the strategy, her voice calm as she describes a sophisticated approach to managing the Engine's compression. "The Engine demands compression, requires singular interpretation to maintain system stability.
      The system needs truth, requires accurate information to function effectively. The solution is layered interpretation."
  - type: pause
    duration: 800
  - type: text
    value: |
      "The active layer is a controlled falsehood that satisfies the Engine's need for compression, providing a single coherent narrative that the Engine can work with. The background layer contains the truth that the system needs for accuracy, preserving the full complexity of reality."
      The two layers operate simultaneously, each serving a different function in the system.
  - type: pause
    duration: 800
  - type: text
    value: |
      She is not deceiving the Engine, not tricking the system into accepting false information. The Engine is aware of the layered structure, knows that the active interpretation is a compression while the background contains the full truth.
      The Engine accepts the active layer as the operating interpretation while knowing the background layer exists.
  - type: pause
    duration: 1000
  - type: text
    value: |
      You realize this is a sophisticated form of resistance. Not by fighting the Engine's compression, not by attempting to prevent the Engine from compressing reality. By working within it to preserve multiplicity through layering.
      The strategy uses the Engine's own mechanisms to protect the truth the Engine would otherwise eliminate.
choices:
  - text: "Understand the interpretive architecture"
    goto: ch29_interpretive_architecture
