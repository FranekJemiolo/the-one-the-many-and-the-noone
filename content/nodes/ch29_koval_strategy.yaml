id: ch29_koval_strategy
content:
  - type: text
    value: |
      A year passes after your threshold choice. If you chose to stay, you and Mira have built a stable life together.
      Your perception continues to develop—you're becoming more adept at navigating the multiplicity, more skilled at accessing other versions while remaining anchored in this one.
      You've become a bridge between realities, helping others who are developing unusual perception understand what they're experiencing.
  - type: pause
    duration: 800
  - type: text
    value: |
      If you chose to shift, you've built a stable life in the new version. You're part of a community where multiplicity is the norm, where everyone experiences multiple realities.
      You've found belonging, acceptance, purpose. But you still think about Mira every day, wondering if she reached her own threshold and made her choice.
  - type: pause
    duration: 800
  - type: text
    value: |
      Either way, Sava calls with an update. "I wanted to let you know—Mira reached her threshold."
      Your heart stops. "What did she choose?"
      "She chose to stay in this version. She's building a life there, working with others who are developing unusual perception."
      She pauses. "She asked about you. She wanted to know if you were okay."
  - type: pause
    duration: 1000
  - type: text
    value: |
      If you stayed: "I'm here. I'm with her."
      "I know. She wanted me to tell you that she's grateful you stayed. That she loves you."
      If you shifted: "I'm okay. I'm building a life here."
      "I told her. She said she's glad you found belonging. Even if it's not with her."
      Sava pauses. "She also said she hopes you're happy. Wherever you are."
choices:
  - text: "Continue to Chapter 30"
    goto: ch29_chapter_end
    set:
      choice_aftermath: 1
      mira_update: 1
