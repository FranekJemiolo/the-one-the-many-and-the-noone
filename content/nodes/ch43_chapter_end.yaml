id: ch43_chapter_end
content:
  - type: text
    value: "The simulation of The No-One configuration ends. The system returns to the current equilibrium. The experience is stored for the final choice."
  - type: pause
    duration: 1000
  - type: text
    value: "The No-One configuration offers complete void peace. The Null Child is dominant. Interpretation has failed. Reality is empty of meaning."
  - type: pause
    duration: 800
  - type: text
    value: "But the cost is the loss of experiential existence. Reality would be peaceful, but also nonexistent. The experience of reality would be gone."
  - type: pause
    duration: 800
  - type: text
    value: "The system has experienced The No-One. It understands the appeal of void peace. It also understands the cost. The experience will inform the final choice."
  - type: pause
    duration: 1000
  - type: text
    value: "The next chapter will explore The Overlap configuration. The system will experience the current equilibrium and understand its appeal and cost."
choices:
  - text: "Continue to Chapter 44"
    goto: chapter_44
