id: ch26_chapter_end
content:
  - type: text
    value: |
      The chapter ends with you reaching the threshold and making your choice.
      If you chose to stay, you're committing to the adaptation path—making this version your home base while accessing other versions as needed.
      Mira is relieved that you stayed, that you chose her and this version over the comfort of a version where your perception is the norm.
  - type: pause
    duration: 1000
  - type: text
    value: |
      If you chose to shift, you're choosing to leave this version behind for a version where your perception is the norm.
      Mira is devastated, feeling abandoned after fighting for you through the legal battle.
      The shift isn't death, but to her it feels like loss.
  - type: pause
    duration: 800
  - type: text
    value: |
      Either way, the choice is made. The threshold is crossed. Your perception will stabilize in the version you've chosen.
      The legal battle established your rights. Now you're establishing your life—either here with Mira, or elsewhere where you belong.
  - type: pause
    duration: 800
  - type: text
    value: |
      Mira is still your anchor. The love you confessed in Chapter 8 is solid, lasting, the foundation for everything that comes next.
      If you stayed, she's celebrating your choice to remain with her.
      If you shifted, she's grieving your departure, even though you still exist in another version.
  - type: pause
    duration: 1000
  - type: text
    value: |
      Dr. Kaczmarek is still your ally—connecting you with Sava, supporting your exploration, going against the system he works for.
      He believes in understanding. He believes your perception is real. He's willing to help you find answers.
  - type: pause
    duration: 800
  - type: text
    value: |
      This is the continuation of Part III. The legal battle is won, but the personal journey continues.
      The cracks in reality are widening. The system is responding. The convergence is approaching.
      And Sava Illich has been your guide through the threshold—helping you make the choice that will determine your future.
choices:
  - text: "Continue to Chapter 27"
    goto: chapter_27
    set:
      chapter_26_completed: 1
