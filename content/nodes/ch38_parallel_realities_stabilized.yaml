id: ch38_parallel_realities_stabilized
content:
  - type: text
    value: |
      The endgame continues. Days pass as the transformation accelerates, the boundaries between versions becoming more stable, the enhanced accessibility of multiplicity becoming more permanent.
      If you chose to stay, you're watching the gaps between realities solidify, the enhanced accessibility locking in as a permanent feature of this version.
      If you chose to shift, you're watching the connection across versions solidify, the enhanced accessibility locking in as a permanent feature of the new version.
  - type: pause
    duration: 800
  - type: text
    value: |
      Either way, the transformation is visible. Reality is restructuring itself, the new configuration becoming more stable with each passing day.
      Sava calls with an update. "The transformation is progressing faster than expected. The new configuration is stabilizing rapidly."
      "How much longer?"
      "Days. Maybe less. The system is committing to the new configuration."
  - type: pause
    duration: 800
  - type: text
    value: |
      "What happens when it's complete?"
      "The new configuration of reality will be permanent. The enhanced accessibility of multiplicity will be irreversible."
      She pauses. "You'll be able to live your life in the version you chose, with the enhanced accessibility of multiplicity as a permanent feature of reality."
  - type: pause
    duration: 1000
  - type: text
    value: |
      "And Mira?"
      "She'll be able to live her life in the version she chose, with the enhanced accessibility of multiplicity as a permanent feature of reality."
      She meets your eyes. "The endgame is almost complete. The transformation is nearly finalized."
choices:
  - text: "Continue to Chapter 39"
    goto: ch38_chapter_end
    set:
      endgame_progressing: 1
