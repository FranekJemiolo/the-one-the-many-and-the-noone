id: ch23_chapter_end
content:
  - type: text
    value: |
      The chapter ends with the revelation that Mira is developing resonant perception—your perception is spreading to her through your emotional connection.
      If you asked about prevention, you learned that the only way to reduce the risk is to create emotional distance, to spend less time together.
      But that would hurt both of you, and it would sacrifice the very connection that makes life worth living.
  - type: pause
    duration: 1000
  - type: text
    value: |
      If you asked about support, you learned that the healthier approach is to accept what's happening and guide Mira through it.
      Sava suggested that love doesn't mean choosing the same path—it means supporting each other's choices, even when they lead in different directions.
      The connection that anchors you to this version could become the connection that helps you both navigate the multiplicity.
  - type: pause
    duration: 800
  - type: text
    value: |
      Either way, the revelation has created a new complication. Mira might reach her own threshold and make her own choice about which version to inhabit.
      Her choice might not align with yours. The connection that anchors you to this version could become the connection that pulls you apart.
  - type: pause
    duration: 800
  - type: text
    value: |
      Mira is still your anchor. The love you confessed in Chapter 8 is solid, lasting, the foundation for everything that comes next.
      But now that love is complicated by the possibility that you might end up in different versions of reality.
  - type: pause
    duration: 1000
  - type: text
    value: |
      Dr. Kaczmarek is still your ally—connecting you with Sava, supporting your exploration, going against the system he works for.
      He believes in understanding. He believes your perception is real. He's willing to help you find answers.
  - type: pause
    duration: 800
  - type: text
    value: |
      This is the continuation of Part III. The legal battle is won, but the personal journey continues.
      The cracks in reality are widening. The system is responding. The convergence is approaching.
      And Sava Illich is becoming a mirror—showing you what you're becoming, challenging you to think about your connection to Mira.
choices:
  - text: "Continue to Chapter 24"
    goto: chapter_24
    set:
      chapter_23_completed: 1
