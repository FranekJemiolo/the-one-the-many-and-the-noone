id: ch20_interpretation_conflict_peaks
content:
  - type: text
    value: "The interpretation conflict peaks. You and Mira cannot agree on how to render the moment. Both interpretations feel equally true, and both refuse to yield."
  - type: pause
    duration: 800
  - type: text
    value: "This is not a disagreement about facts. It is a fundamental conflict between causal interpretation and emotional interpretation."
  - type: pause
    duration: 800
  - type: text
    value: "Aleksy cannot accept that emotional truth can override causal truth. Mira cannot accept that causal truth can override emotional truth."
  - type: pause
    duration: 1000
  - type: text
    value: "You realize this is the microcosm of the larger conflict. The Engine represents Aleksy's preference for causal singularity. The Resistance represents Mira's preference for emotional multiplicity."
choices:
  - text: "Observe that there is no resolution"
    goto: ch20_no_resolution
