id: ch10_performance_reframing
content:
  - type: text
    value: |
      The next morning, you arrive at Dr. Kaczmarek's office at 10 AM sharp. The corridors feel different today—less hostile, more neutral, as if the building itself is waiting to see how this session goes.
      Dr. Kaczmarek is already there, his notebook open, his pen ready. "Aleksy. Good to see you."
  - type: pause
    duration: 800
  - type: text
    value: |
      "You too."
      "Before we begin, I want to reiterate our agreement. You get copies of everything. You review results before they go to HR. You have control over the narrative."
      He pauses. "I intend to honor that agreement. I want you to trust that."
  - type: pause
    duration: 800
  - type: text
    value: |
      "I'll trust when I see evidence."
      "Fair enough. Let's begin."
      He opens his notebook to a fresh page. "Tell me about the dreams. The first one. The hunt."
  - type: pause
    duration: 1000
  - type: text
    value: |
      You tell him about the animal POV—the cold, the height, the focus, the impossible miss when the moment itself changed.
      He writes everything down, his pen moving across the page with precise, controlled strokes. He doesn't interrupt, doesn't judge, just documents.
  - type: pause
    duration: 800
  - type: text
    value: |
      "And the second dream?" he asks when you finish.
      You tell him about being hunted—the fear, the escape, the emotional reversal where you felt relief before you were safe.
      He writes that down too, his expression thoughtful.
  - type: pause
    duration: 1000
  - type: text
    value: |
      "These are remarkably consistent," he says when you finish. "The details are vivid. The emotional resonance is strong."
      "They feel real."
      "I believe they feel real to you. The question is whether they're memories from other versions of yourself, or whether they're something else entirely."
      He looks up. "What do you think they are?"
choices:
  - text: "Share your theory about alternate selves"
    goto: ch10_theory_sharing
    set:
      dr_kaczmarek_trust: 60
  - text: "Keep your theory private for now"
    goto: ch10_cautious_sharing
    set:
      dr_kaczmarek_trust: 40

