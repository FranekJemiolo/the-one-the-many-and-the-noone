    value: "You arrive at your destination. The journey took forty minutes according to the clock. But emotionally, it was multiple journeys simultaneously."
  - type: pause
    duration: 1000
  - type: text
    value: "The Passenger continues their transit. They are not experiencing time incorrectly. They are experiencing emotional time as an independent system."
  - type: pause
    duration: 800
  - type: text
    value: "You realize this is how the Resistance operates—not by fighting causal time, but by expanding emotional time into a multiplicity system."
  - type: pause
    duration: 800
  - type: text
    value: "The cracks continue: memory divergence, emotional-causal split, temporal instability, causal duplication, dual-reality memory, compression pressure, contradiction injection, emotional time independence."
  - type: pause
    duration: 1000
  - type: text
    value: "Reality is not just breaking. It is revealing that time itself is multiple—causal time and emotional time, operating independently."
