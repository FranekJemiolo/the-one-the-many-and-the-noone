id: ch8_chapter_end
content:
  - type: text
    value: |
      The chapter ends with you and Mira in your apartment, the evening settling around you.
      If you expressed your feelings, you've crossed a threshold—you're in love, and she loves you back. The relationship is now a partnership, not just friendship.
      If you focused on the institutional situation, you've made a plan—you'll accept Dr. Kaczmarek's partnership on your terms, with conditions that protect you.
  - type: pause
    duration: 1000
  - type: text
    value: |
      Either way, the relationship is deepening. The shared deja vu from Chapter 5 changed things—the recognition that you're experiencing the same moment simultaneously, that your perceptions are resonating.
      It created a bond that goes beyond ordinary connection.
  - type: pause
    duration: 800
  - type: text
    value: |
      Mira is your anchor. The one who keeps you grounded while your perception fractures. The one who reminds you who you are when reality tries to pull you apart.
      And now, possibly, the one you're building a life with.
  - type: pause
    duration: 800
  - type: text
    value: |
      The institutional pressure is still real. Dr. Kaczmarek is still a question mark. Termination is still being discussed.
      But you're not facing it alone anymore. You have Mira. You have a plan. You have a chance.
  - type: pause
    duration: 1000
  - type: text
    value: |
      This is the deepening of relationship building. The foundation for what comes next.
      Whatever the system throws at you, whatever challenges arise, you'll face them together.
      And that might be enough to get you through this.
  - type: pause
    duration: 800
  - type: text
    value: |
      You're not facing this alone anymore.
      Whatever the system throws at you, you'll face it together.
choices:
  - text: "Continue to Chapter 9"
    goto: chapter_9
    set:
      chapter_8_completed: 1
