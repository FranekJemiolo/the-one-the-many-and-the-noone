id: ch34_chapter_end
content:
  - type: text
    value: |
      The chapter ends with the new reality configuration established. The convergence has transformed reality—the boundaries between versions are now permeable, the multiplicity more accessible than ever before.
      If you chose to stay, you're adapting to the new configuration, able to access other versions while remaining anchored in this one with minimal effort.
      If you chose to shift, you're adapting to the new configuration, able to access this version while remaining anchored in the new one with minimal effort.
  - type: pause
    duration: 1000
  - type: text
    value: |
      Either way, the convergence has changed everything. The legal battle established your rights. The threshold gave you the freedom to choose. The convergence has transformed reality itself.
      You're living in a new configuration of reality—one that accommodates multiplicity more fully than ever before.
  - type: pause
    duration: 800
  - type: text
    value: |
      Mira is still your anchor. If you stayed, she's building a life with you, your love enduring through the years, the threshold, the convergence.
      If you shifted, she's building a life in this version while you build yours in another, connected across the multiplicity by the love you share.
  - type: pause
    duration: 1000
  - type: text
    value: |
      Dr. Kaczmarek is still your ally—checking in on you, supporting your journey, going against the system he works for.
      He believes in understanding. He believes your perception is real. He's willing to help you find answers.
  - type: pause
    duration: 800
  - type: text
    value: |
      Sava Illich has been your guide through the threshold—helping you understand your perception, navigate the choice, live with the consequences.
      Now she's witnessing the convergence she predicted, the new reality configuration that accommodates multiplicity more fully.
  - type: pause
    duration: 1000
  - type: text
    value: |
      The named multiplicities have formed an ecosystem—Echo, Barrier, Archive, Trajectory interacting in stable patterns.
      The convergence has transformed reality—and you're adapting to the new configuration.
choices:
  - text: "Continue to Chapter 35"
    goto: chapter_35
    set:
      chapter_34_completed: 1
