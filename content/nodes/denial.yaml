id: denial
content:
  - type: text
    value: "The message does not disappear. Instead, it stops responding to your attempts to interact with it."
  - type: pause
    duration: 500
  - type: text
    value: "It remains present, like an equation that refuses to simplify further, not because it is unsolvable—but because solving it would remove the observer from the result."
  - type: pause
    duration: 500
  - type: text
    value: "You try to ignore it, to return to your work, to pretend this is all some elaborate hallucination. But the world around you has changed. Every interaction now carries the weight of something being observed."
choices:
  - text: "Continue to chapter 5"
    goto: ch4_to_ch5_bridge
