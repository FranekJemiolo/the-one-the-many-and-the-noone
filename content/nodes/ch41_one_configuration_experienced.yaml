id: ch41_one_configuration_experienced
content:
  - type: text
    value: |
      If you chose to stay in this version with Mira, this is your resolution path.
      Years have passed since the endgame completed. The new configuration of reality is permanent, the enhanced accessibility of multiplicity irreversible.
      You and Mira have built a life together in this version, becoming bridges between realities while remaining anchored in your home.
  - type: pause
    duration: 800
  - type: text
    value: |
      Your perception has fully stabilized—you're adept at navigating the multiplicity, skilled at accessing other versions while remaining anchored in this one.
      You've become a bridge between realities, helping others who are developing unusual perception understand what they're experiencing.
      The legal battle you fought established rights for people like you. The precedent you set has helped countless others.
  - type: pause
    duration: 800
  - type: text
    value: |
      Mira is still your anchor. The love you confessed in Chapter 8 has endured through the years, the threshold, the convergence, the endgame.
      You're building a life together, facing the challenges of multiplicity as a team.
      The timing mismatch you worried about in Chapter 25 resolved itself—Mira reached her threshold and chose to stay, just as you did.
  - type: pause
    duration: 1000
  - type: text
    value: |
      Dr. Kaczmarek is still your ally—checking in on you, supporting your journey, going against the system he works for.
      He believes in understanding. He believes your perception is real. He's willing to help you find answers.
      Sava Illich has been your guide through the threshold—helping you understand your perception, navigate the choice, live with the consequences.
      Now she's a colleague, a fellow bridge between realities, someone who understands what it means to live with multiplicity.
choices:
  - text: "Continue to Chapter 42"
    goto: ch41_chapter_end
    set:
      stay_resolution: 1
