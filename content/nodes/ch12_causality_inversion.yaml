id: ch12_causality_inversion
content:
  - type: text
    value: "You analyze the causality inversion. Normally, the present causes the future. But here, the future is appearing as a memory in the present."
  - type: pause
    duration: 800
  - type: text
    value: "This creates a causal loop: the future memory influences present decisions, which then create the future that was remembered. The future is causing itself."
  - type: pause
    duration: 800
  - type: text
    value: "This should be impossible. Causality requires linear time. But in this zone, time is not linear—it is circular or folded."
  - type: pause
    duration: 1000
  - type: text
    value: "You realize this is what happens when temporal boundaries break down. The future is not ahead of you. It is already present as memory."
choices:
  - text: "Observe the temporal anomaly"
    goto: ch12_temporal_anomaly
