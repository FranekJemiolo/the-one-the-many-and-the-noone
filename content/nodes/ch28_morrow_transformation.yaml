id: ch28_morrow_transformation
content:
  - type: text
    value: |
      Months pass after your threshold choice. If you chose to stay, you and Mira are building a life together in this version.
      Your perception has stabilized—you can access the multiplicity while remaining anchored in this version. You've become a bridge between realities, able to visit other versions while making this one your home.
  - type: pause
    duration: 800
  - type: text
    value: |
      If you chose to shift, you're building a life in the new version where multiplicity is the norm.
      Your perception has stabilized—you're accepted, you belong, you're part of a community where everyone experiences multiple realities.
      But you still think about Mira every day.
  - type: pause
    duration: 800
  - type: text
    value: |
      Either way, the legal battle feels like a lifetime ago. The precedent you set is helping others—people with unusual perception are winning their cases, companies are changing their policies, the system is adapting.
      Dr. Kaczmarek calls to check in. "How are you doing?"
      "Stabilized. Building a life."
      "And the choice? Do you regret it?"
  - type: pause
    duration: 1000
  - type: text
    value: |
      If you stayed: "No. I chose to stay with Mira. That was the right choice."
      If you shifted: "Sometimes. I miss her. But I belong here. That matters too."
      Dr. Kaczmarek nods. "There's no perfect choice. But there's your choice. And you have to live with it."
      "I know. I'm learning to."
choices:
  - text: "Continue to Chapter 29"
    goto: ch28_chapter_end
    set:
      choice_aftermath: 1
      life_building: 1
