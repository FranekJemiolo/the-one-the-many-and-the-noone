id: ch39_system_selects_plural
content:
  - type: text
    value: |
      The endgame reaches its final phase. The transformation is nearly complete, the new configuration of reality almost permanent.
      If you chose to stay, you're watching the enhanced accessibility of multiplicity lock in as a permanent feature of this version.
      If you chose to shift, you're watching the enhanced accessibility of multiplicity lock in as a permanent feature of the new version.
  - type: pause
    duration: 800
  - type: text
    value: |
      Either way, the transformation is visible. Reality has restructured itself, the new configuration stable and permanent.
      Sava calls with a final update. "The endgame is complete. The transformation is finalized."
      "What does that mean?"
      "It means the new configuration of reality is permanent. The enhanced accessibility of multiplicity is irreversible."
  - type: pause
    duration: 800
  - type: text
    value: |
      "So it's done?"
      "It's done. The legal battle established your rights. The threshold gave you the freedom to choose. The convergence transformed reality. The endgame has finalized everything."
      She pauses. "You can now live your life in the version you chose, with the enhanced accessibility of multiplicity as a permanent feature of reality."
  - type: pause
    duration: 1000
  - type: text
    value: |
      "And Mira?"
      "She can now live her life in the version she chose, with the enhanced accessibility of multiplicity as a permanent feature of reality."
      She meets your eyes. "The transformation is complete. The new configuration of reality is permanent."
choices:
  - text: "Continue to Chapter 40"
    goto: ch39_chapter_end
    set:
      endgame_complete: 1
