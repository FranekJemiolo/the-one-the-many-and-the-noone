  - type: text
    value: "You realize this is another crack in the assumption of linear time. The future is not ahead of you. In anomaly zones, it is already present as memory."
  - type: pause
    duration: 800
  - type: text
    value: "The cracks continue: memory divergence, emotional-causal split, temporal instability, causal duplication, dual-reality memory, compression pressure, contradiction injection, emotional time independence, causal breakdown, Clarity enforcement, memory reconciliation, future leak."
  - type: pause
    duration: 1000
  - type: text
