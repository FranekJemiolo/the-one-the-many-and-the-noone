id: ch12_chapter_end
content:
  - type: text
    value: |
      The chapter ends with you facing the consequences of your choice.
      If you accepted the separation package, you're unemployed but financially secure—bound by confidentiality and monitoring conditions, but free from immediate legal threat.
      But you also feel the weight of surrender, the knowledge that you let the system define the terms of your existence.
  - type: pause
    duration: 1000
  - type: text
    value: |
      If you refused the package, you're facing termination for cause and a potential legal battle—out of work, facing financial uncertainty, but holding onto your autonomy.
      But you also have allies. Mira is offering her savings. Dr. Kaczmarek is connecting you with attorneys. You're not fighting alone.
  - type: pause
    duration: 800
  - type: text
    value: |
      Either way, the institutional conflict has escalated. The company has made its move. They've pushed you out, framed you as a liability, tried to control your narrative.
      This is no longer about documentation or understanding. This is about power.
  - type: pause
    duration: 800
  - type: text
    value: |
      Kai Rosen remembers the future before it happens.
      If that's possible, then causality itself is not what you thought it was.
      Mira is still your anchor. The love you confessed in Chapter 8 is solid, lasting, the foundation for everything that comes next.
      She's standing with you whether you surrendered or fought—offering support, offering resources, refusing to let the system break you.
  - type: pause
    duration: 1000
  - type: text
    value: |
      Dr. Kaczmarek is becoming more than an ally—he's a co-conspirator, documenting your case off the books, connecting you with resources, going against the system he works for.
      He believes in understanding. He believes your perception is real. He's willing to risk his position to help you.
  - type: pause
    duration: 800
  - type: text
    value: |
      This is the escalation of Part II. The institutional conflict is open now. The battle lines are drawn.
      The cracks in reality are widening. The system is responding. The convergence is approaching.
      And for the first time, you're not just experiencing multiplicity—you're fighting for your right to exist within it.
choices:
  - text: "Continue to Chapter 13"
    goto: chapter_13
    set:
      chapter_12_completed: 1
