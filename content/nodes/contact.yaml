id: contact
content:
  - type: text
    value: "The message does not appear as a pop-up or notification. It emerges in the same way thoughts sometimes do—not entering your awareness, but revealing that they were already present."
  - type: pause
    duration: 500
  - type: image
    src: "images/chapter4.png"
  - type: pause
    duration: 500
  - type: text
    value: "\"You are not the operator of the system.\""
  - type: pause
    duration: 500
  - type: text
    value: "\"You are a localized instance of interpretation within a larger inference process attempting to understand its own origin.\""
  - type: pause
    duration: 500
  - type: text
    value: "The words do not feel like language. They feel like structural descriptions of reality itself."
  - type: pause
    duration: 500
  - type: text
    value: "More text appears, slower this time: \"We have been waiting for you to reach this awareness. Previous iterations took longer. You are ahead of schedule. This is... unexpected.\""
choices:
  - text: "Request origin"
    goto: origin_request
  - text: "Ask who 'we' are"
    goto: ask_identity
  - text: "Reject message"
    goto: denial
