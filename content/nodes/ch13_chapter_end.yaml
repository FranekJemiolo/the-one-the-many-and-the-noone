id: ch13_chapter_end
content:
  - type: text
    value: "You leave Morrow Vale. The ecological zone continues its cycles, with machines participating in the living memory of the ecosystem."
  - type: pause
    duration: 1000
  - type: text
    value: "Morrow Vale is not a person in the traditional sense. They are the ecological memory system itself, given voice through the integration of machines and biology."
  - type: pause
    duration: 800
  - type: text
    value: "You realize this is another form of multiplicity. Machines are not just mechanical systems. They can participate in ecological memory. They can feel and remember as part of a living system."
  - type: pause
    duration: 800
  - type: text
    value: "The interpretation engines are expanding. Aleksy (causal), Mira (emotional), Rose (coherence), Kai (temporal), Morrow (ecological). Each reveals a different way reality can be multiple."
  - type: pause
    duration: 1000
  - type: text
    value: "The world is not just breaking down. It is revealing its true nature as a multiplicity system with many different interpretation engines."
choices:
  - text: "Continue to Chapter 14"
    goto: chapter_14
