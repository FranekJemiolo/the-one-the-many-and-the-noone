id: ch13_chapter_end
content:
  - type: text
    value: |
      The chapter ends with you at a crossroads.
      If you chose to build a legal strategy, you're working with Elena Vance, considering whether to use the disability framework as leverage.
      It's a strategic choice—using the system's tools against it—but it feels like a betrayal of your perception.
  - type: pause
    duration: 1000
  - type: text
    value: |
      If you chose to focus on healing, you've spent time with Mira, reconnecting with your sense of self outside the institutional conflict.
      The alternate self dream reminded you that you're not alone—that having allies makes all the difference.
  - type: pause
    duration: 800
  - type: text
    value: |
      Either way, the institutional erasure is real. The company has removed you, erased your presence, tried to make it as if you never existed.
      But you're still here. You still have Mira. You still have Dr. Kaczmarek. You still have allies.
  - type: pause
    duration: 800
  - type: text
    value: |
      Mira is still your anchor. The love you confessed in Chapter 8 is solid, lasting, the foundation for everything that comes next.
      She's supporting you whether you're fighting or healing—offering resources, offering comfort, refusing to let the system break you.
  - type: pause
    duration: 1000
  - type: text
    value: |
      Dr. Kaczmarek is still your ally—documenting your case off the books, connecting you with resources, going against the system he works for.
      He believes in understanding. He believes your perception is real. He's willing to risk his position to help you.
  - type: pause
    duration: 800
  - type: text
    value: |
      This is the continuation of Part II escalation. The institutional conflict is established. The battle lines are drawn.
      The cracks in reality are widening. The system is responding. The convergence is approaching.
      And you're starting to realize: this isn't just about your perception anymore. It's about the right to exist as who you are.
choices:
  - text: "Continue to Chapter 14"
    goto: chapter_14
    set:
      chapter_13_completed: 1
