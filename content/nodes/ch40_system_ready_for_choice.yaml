id: ch40_system_ready_for_choice
content:
  - type: text
    value: |
      The transformation is complete. The new configuration of reality is permanent. The enhanced accessibility of multiplicity is irreversible.
      If you chose to stay, you're living in this version with the enhanced accessibility of multiplicity as a permanent feature of reality.
      If you chose to shift, you're living in the new version with the enhanced accessibility of multiplicity as a permanent feature of reality.
  - type: pause
    duration: 800
  - type: text
    value: |
      Either way, the legal battle established your rights. The threshold gave you the freedom to choose. The convergence transformed reality. The endgame finalized everything.
      You've completed the journey. You've fought for your right to exist, made your choice about which version of reality to inhabit, and lived through the transformation of reality itself.
  - type: pause
    duration: 800
  - type: text
    value: |
      Aleksy Wrona. That's your name. That's who you are supposed to be.
      But you've learned that who you are is more complicated than that. You're a person with unusual perception who fought for your right to exist, who made a choice about which version of reality to inhabit, who is building a life in that version.
      And with Mira by your side—or connected across versions—you're starting to think that's enough.
  - type: pause
    duration: 1000
  - type: text
    value: |
      The convergence phase is complete. The transformation is finalized. The new configuration of reality is permanent.
      But the story isn't over. The resolution paths are approaching—the final chapters that will determine how the story ends.
      The choices you've made will shape the resolution. The path you've chosen will lead to the ending you deserve.
choices:
  - text: "Continue to Chapter 41"
    goto: ch40_chapter_end
    set:
      convergence_complete: 1
