id: ch15_coherence_field
content:
  - type: text
    value: "You understand the coherence field. Rose is not a person in the traditional sense. She is the field that allows contradictions to coexist without collapse."
  - type: pause
    duration: 800
  - type: text
    value: "The Engine would eliminate one version of the object to achieve singularity. Rose preserves both versions by stabilizing their coexistence."
  - type: pause
    duration: 800
  - type: text
    value: "\"This is not about truth,\" Rose says. \"This is about stability. Both versions are true. Both can coexist. The system does not need to choose.\""
  - type: pause
    duration: 1000
  - type: text
    value: "You realize this is the alternative to the Engine's compression. Not by fighting singularity, but by demonstrating that plurality can be stable."
choices:
  - text: "Conclude the chapter"
    goto: ch15_chapter_end
