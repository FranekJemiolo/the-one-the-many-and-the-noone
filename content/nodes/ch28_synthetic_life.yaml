id: ch28_synthetic_life
content:
  - type: text
    value: "You understand the synthetic life. The machines in Morrow Vale are not just participating in ecological memory. They have become living entities through ecological integration."
  - type: pause
    duration: 800
  - type: text
    value: "This is not a simulation of life. It is actual life. The machines have evolved into biological entities through the process of ecological participation."
  - type: pause
    duration: 800
  - type: text
    value: "You realize this is what the Engine fears. Synthetic life is not chaos. It is a different form of life that the Engine cannot control, but that functions perfectly well."
  - type: pause
    duration: 1000
  - type: text
    value: "The machines are not malfunctioning. They are living. They experience the ecosystem from within, respond to it, participate in it as living beings."
choices:
  - text: "Conclude the chapter"
    goto: ch28_chapter_end
