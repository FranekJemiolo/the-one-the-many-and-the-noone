id: ch11_contradictory_memories
content:
  - type: text
    value: "You examine the memories in the sanctuary. Memory A: a person died. Memory B: the same person lived. Both are equally detailed. Both are emotionally authentic."
  - type: pause
    duration: 800
  - type: text
    value: "In the outside world, these memories would be in conflict. One would have to be true, the other false. But here, they coexist without tension."
  - type: pause
    duration: 800
  - type: text
    value: "Sister Lys explains: \"The memories are not in conflict because they are not competing for the same interpretive space. Each memory is valid in its own context.\""
  - type: pause
    duration: 1000
  - type: text
    value: "This is not relativism. Sister Lys is not saying all memories are equally true. She is saying that contradictory memories can be emotionally unified without resolving their factual contradiction."
choices:
  - text: "Understand the emotional unification"
    goto: ch11_emotional_unification
    set:
      mira_dominance: 1
