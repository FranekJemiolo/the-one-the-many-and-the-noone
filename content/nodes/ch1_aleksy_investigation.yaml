id: ch1_aleksy_investigation
content:
  - type: text
    value: "You approach the problem causally. If two timelines cannot both be true, one must contain an error."
  - type: pause
    duration: 800
  - type: text
    value: "You map the first witness's sequence: 14:03 arrival, 14:05 confrontation, 14:07 departure. Clean. Linear. No gaps."
  - type: pause
    duration: 800
  - type: text
    value: "The second witness: 14:04 arrival, 14:06 confrontation, 14:08 departure. Also clean. Also linear."
  - type: pause
    duration: 1000
  - type: text
    value: "The problem is not inconsistency. It's that both sequences are internally perfect. As if reality branched at the moment of observation."
  - type: pause
    duration: 800
  - type: text
    value: "You write in your notebook: 'Temporal overlap without contradiction. Requires further investigation.'"
choices:
  - text: "Interview the witnesses directly"
    goto: ch1_witness_testimony
  - text: "Cross-reference with Mira's emotional analysis"
    goto: ch1_mira_observation
    require:
      all:
        - var: "mira_dominance"
          op: ">="
          value: 1
