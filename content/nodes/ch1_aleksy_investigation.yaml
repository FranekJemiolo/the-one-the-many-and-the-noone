id: ch1_aleksy_investigation
content:
  - type: text
    value: |
      You approach the problem causally, your mind trained to seek the single thread of truth that must exist beneath the surface of contradiction.
      If two timelines cannot both be true, then by logical necessity, one must contain an error—a misperception, a misremembering, a deliberate fabrication.
  - type: pause
    duration: 800
  - type: text
    value: |
      You map the first witness's sequence with meticulous precision: 14:03 arrival, 14:05 confrontation, 14:07 departure.
      Clean. Linear. No gaps. Every moment follows the one before it in an unbroken chain of cause and effect.
      This is how reality operates—this is how it must operate. The witness, Aleksy, watches you work with an intensity that suggests he understands the stakes.
  - type: pause
    duration: 800
  - type: text
    value: |
      "I know what I saw," Aleksy says, his voice tight with frustration. "The timing was exact. I checked my watch immediately after—it was 14:07. There's no way I could be wrong about this."
      He's not arrogant—he's certain. And his certainty is unsettling because it feels so genuine.
  - type: pause
    duration: 800
  - type: text
    value: |
      The second witness tells a different story: 14:04 arrival, 14:06 confrontation, 14:08 departure.
      Also clean. Also linear. Also internally consistent in its own right.
      The problem is not that one sequence is flawed; the problem is that both sequences are internally perfect.
  - type: pause
    duration: 1000
  - type: text
    value: |
      The problem is not inconsistency. It's that both sequences are internally perfect, each one complete and unbroken in its causality.
      As if reality itself branched at the moment of observation, creating two parallel timelines that cannot be reconciled because neither is false.
      Aleksy looks at you, his expression desperate. "You have to find the error. One of us has to be wrong. Please."
choices:
  - text: "Interview the witnesses directly"
    goto: ch1_witness_testimony
  - text: "Cross-reference with Mira's emotional analysis"
    goto: ch1_mira_observation
    require:
      all:
        - var: "mira_dominance"
          op: ">="
          value: 1
