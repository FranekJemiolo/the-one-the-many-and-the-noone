id: ch3_layer_training
content:
  - type: text
    value: |
      "Train me to access the organization's layer," you say, accepting the risk to gain the ability to investigate the entity behind the anomalies.
      Vance considers this, then nods slowly. "It's possible, but it will require extensive training. You'll need to develop abilities beyond simple temporal navigation."
  - type: pause
    duration: 800
  - type: text
    value: |
      "The organization operates in the gaps between realities," she explains. "To access their layer, you need to learn to perceive not just multiple timelines, but the structural gaps between them.
      You need to develop the ability to navigate the void between realities, where normal rules don't apply."
  - type: pause
    duration: 800
  - type: text
    value: |
      Vance begins advanced training, teaching you techniques for perceiving the structural gaps between realities. The training is more difficult than temporal navigation, requiring you to perceive something that shouldn't exist—the spaces between different versions of reality.
  - type: pause
    duration: 1000
  - type: text
    value: |
      "You're making progress," she says after hours of practice. "You can feel the gaps now. You can sense where one reality ends and another begins.
      But accessing the organization's layer requires more than perception—it requires the ability to enter those gaps and navigate them."
  - type: pause
    duration: 800
  - type: text
    value: |
      "What happens if I enter the gaps?" you ask.
      "You'll be in a space where normal causality doesn't apply," Vance warns. "Time may not flow linearly. Space may not follow normal geometry.
      The organization uses these gaps for communication and coordination, protected by the very properties that make them inaccessible."
  - type: pause
    duration: 800
  - type: text
    value: |
      "The training will take weeks," she says. "Maybe months. Are you prepared to commit that much time to developing abilities that might make you a target of the organization?"
      This is a significant commitment. Developing these abilities would require dedicating yourself to training, with the risk that the organization will notice your growing capabilities.
  - type: pause
    duration: 800
  - type: text
    value: |
      You think about Aleksy and Mira. Aleksy would be skeptical of this training—he would want concrete evidence that the organization exists and is responsible for the anomalies before committing to such a dangerous path.
      Mira would be more open to it, trusting your intuition about the gaps between realities, but she would worry about the personal cost of spending months in training.
choices:
  - text: "Commit to the full training program"
    goto: ch3_advanced_training
    set:
      layer_training_commitment: 1
      vance_mentor: 1
      long_term_training: 1
  - text: "Postpone advanced training for now"
    goto: ch3_clock_inconsistency
    set:
      layer_training_deferred: 1
      immediate_focus: 1
