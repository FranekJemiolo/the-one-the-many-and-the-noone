id: ch3_layer_training
content:
  - type: text
    value: |
      A week passes. The dreams continue—sometimes every night, sometimes skipping a day.
      Each dream is different, but they all share the same quality: the feeling that you're remembering something that wasn't human, accessing memories from other versions of yourself.
  - type: pause
    duration: 800
  - type: text
    value: |
      You've been documenting everything. The patterns are becoming clearer.
      Predator dreams and prey dreams. Hunting and being hunted. Moments that shift, emotions that anticipate events.
      Your mind is accessing something real, something structured, something that operates by rules you don't understand.
  - type: pause
    duration: 800
  - type: text
    value: |
      Mira has been helping. She comes over most evenings, reviews your documentation, offers perspectives you wouldn't have considered.
      "You're not just having dreams," she says one evening. "You're developing a new kind of perception. A way of seeing reality that most people don't have access to."
  - type: pause
    duration: 1000
  - type: text
    value: |
      "Perception of what?"
      "Of the gaps. The spaces between different versions of reality. The places where one timeline ends and another begins."
      She pauses. "I know someone who might be able to help you understand this better. Someone who operates in those gaps."
  - type: pause
    duration: 800
  - type: text
    value: |
      "Who?"
      "Vance. She's... difficult to describe. She exists between realities, in a way. She teaches people how to navigate the gaps."
      Mira studies your face. "It would be training. Extensive training. Weeks, maybe months. But if you want to understand what's happening to you, she might be the only one who can explain it."
  - type: pause
    duration: 800
  - type: text
    value: |
      "Training to do what?"
      "To perceive the structural gaps between realities. To navigate the void where normal rules don't apply. To understand why you're accessing these memories and what they mean."
      She pauses. "But it's dangerous. The organization that operates in those gaps... they notice when people develop these abilities. You could become a target."
  - type: pause
    duration: 1000
  - type: text
    value: |
      You consider this. The dreams are getting more vivid. The patterns more clear. Whatever is happening to you, it's not going away on its own.
      You could ignore it, try to suppress it, pretend it's not real.
      Or you could learn to understand it, develop the ability to navigate it, figure out what it means.
choices:
  - text: "Commit to the training with Vance"
    goto: ch3_meeting_vance
    set:
      layer_training_commitment: 1
      vance_mentor: 1
      aleksy_fracture_level: 45
  - text: "Decline for now, continue documenting on your own"
    goto: ch3_clock_inconsistency
    set:
      layer_training_deferred: 1
      aleksy_detachment: 30
