id: ch8_emotional_commitment
content:
  - type: text
    value: |
      The days following Dr. Kaczmarek's offer are tense. If you accepted the partnership, you're attending regular documentation sessions, tracking your perception, building a case for your value to the company.
      If you refused, you're waiting for the other shoe to drop—knowing termination is being discussed, knowing the system is making moves.
  - type: pause
    duration: 800
  - type: text
    value: |
      Through it all, Mira is your constant. She comes over every evening, reviews your documentation, offers perspectives you wouldn't have considered.
      "You're doing the right thing," she says one night. "Whatever you chose, you're doing the right thing."
  - type: pause
    duration: 800
  - type: text
    value: |
      "I don't know that. If I accepted, I might be giving Dr. Kaczmarek information he'll use against me. If I refused, I might be throwing away my only chance at institutional support."
      "You're making the best choice you can with the information you have. That's all anyone can do."
      She pauses. "And you're not doing it alone."
  - type: pause
    duration: 1000
  - type: text
    value: |
      The relationship between you is deepening. Not just friendship anymore—something more.
      The shared deja vu from Chapter 5 changed things. The recognition that you're experiencing the same moment simultaneously, that your perceptions are resonating.
      It created a bond that goes beyond ordinary connection.
  - type: pause
    duration: 800
  - type: text
    value: |
      "I don't know what I'd do without you," you say.
      "You'd survive. You're stronger than you think."
      She meets your eyes. "But you wouldn't have anyone to remind you that you're not crazy. That what you're experiencing is real."
  - type: pause
    duration: 1000
  - type: text
    value: |
      The moment feels significant. Like a threshold you're crossing together.
      You want to say something—to put into words what's growing between you—but the words don't come.
      Maybe they don't need to. Maybe she already knows.
choices:
  - text: "Express your feelings to Mira"
    goto: ch8_relationship_deepening
    set:
      mira_trust: 100
      relationship_focus: true
  - text: "Focus on the institutional situation"
    goto: ch8_institutional_update
    set:
      institutional_pressure: 40
