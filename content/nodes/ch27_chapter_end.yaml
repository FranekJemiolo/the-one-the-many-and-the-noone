id: ch27_chapter_end
content:
  - type: text
    value: |
      The chapter ends with the aftermath of your threshold choice.
      If you chose to stay, your perception is stabilizing as you adapt to the multiplicity while remaining anchored in this version.
      Mira is relieved, and you're building a life together despite the challenges of multiplicity.
  - type: pause
    duration: 1000
  - type: text
    value: |
      If you chose to shift, your perception is stabilizing in the new version where multiplicity is the norm.
      You're accepted, you belong, but Mira is grieving your departure even though you still exist in another version.
  - type: pause
    duration: 800
  - type: text
    value: |
      Either way, the choice has consequences. There's no perfect choice—you gain stability but pay with connection, or gain connection but pay with stability.
      Sava reminded you that you have to live with your choice, that there's no going back.
  - type: pause
    duration: 800
  - type: text
    value: |
      Mira is still your anchor. If you stayed, she's celebrating your choice to remain with her.
      If you shifted, she's grieving your departure, even though you still exist in another version.
      The love you confessed in Chapter 8 remains, but the relationship has been transformed by your choice.
  - type: pause
    duration: 1000
  - type: text
    value: |
      Dr. Kaczmarek is still your ally—connecting you with Sava, supporting your exploration, going against the system he works for.
      He believes in understanding. He believes your perception is real. He's willing to help you find answers.
  - type: pause
    duration: 800
  - type: text
    value: |
      This is the continuation of Part III. The legal battle is won, but the personal journey continues.
      The cracks in reality are widening. The system is responding. The convergence is approaching.
      And Sava Illich has been your guide through the threshold—helping you make the choice that will determine your future.
choices:
  - text: "Continue to Chapter 28"
    goto: chapter_28
    set:
      chapter_27_completed: 1
