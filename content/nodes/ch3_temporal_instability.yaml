id: ch3_temporal_instability
content:
  - type: text
    value: "You write your final report. The conclusion is simple: Geostation Three is not malfunctioning. It is hosting multiple valid sequences of the same present."
  - type: pause
    duration: 1000
  - type: text
    value: "The station continues functioning. The researchers continue their work. The Guard continues their duties. Nothing collapses."
  - type: pause
    duration: 800
  - type: text
    value: "But something has changed. Time is no longer a shared constant. It is a locally selected continuity interpretation field. Each observer experiences their own sequence, and all sequences are equally real."
  - type: pause
    duration: 800
  - type: text
    value: "This is the third crack. First: memory divergence. Second: emotional-causal split. Now: temporal instability. Reality is not just producing multiple pasts and multiple feelings. It is producing multiple timelines simultaneously."
  - type: pause
    duration: 1000
  - type: text
    value: "You leave the station with the uncomfortable knowledge that time itself is not what you thought it was. It is not a line. It is a field of possibilities that collapses differently depending on who is observing."
choices:
  - text: "Conclude the investigation"
    goto: ch3_chapter_end
