id: ch4_protection_offer
content:
  - type: text
    value: |
      "I'll help you protect your terms," you offer. "If the organization tries to integrate you without respecting your multiplicity and autonomy, I'll help you resist."
      The cyborg's displays show a momentary flicker of surprise, then stabilize with what you interpret as gratitude.
  - type: pause
    duration: 800
  - type: text
    value: |
      "Why would you help me?" the cyborg asks. "I am a test subject in an experiment you are investigating. Helping me risks interfering with the organization's plans."
      "Because I believe that consciousness should be built on consent," you reply. "Because I believe that multiplicity and autonomy are worth preserving.
      Because I don't want the distributed consciousness to be built on the violation of its components."
  - type: pause
    duration: 800
  - type: text
    value: |
      Chen looks at you with concern. "This is dangerous. The organization has resources beyond our understanding. Interfering with their plans could have consequences."
      "I know the risks," you say. "But I also know that if the consciousness awakens without these values, it could be catastrophic for everyone."
      "Influencing the cyborg is the best chance we have to shape the consciousness's development."
  - type: pause
    duration: 1000
  - type: text
    value: |
      "I accept your help," the cyborg says. "But understand that my resistance will be non-violent. I will not fight the organization with force.
      I will simply refuse to participate in integration that violates my essential nature."
  - type: pause
    duration: 800
  - type: text
    value: |
      "Non-violent resistance can be powerful," you reply. "If the cyborg refuses integration, the consciousness might not function properly without a memory node.
      The organization might be forced to negotiate terms rather than forcing compliance."
choices:
  - text: "Continue the investigation with the cyborg as an ally"
    goto: ch4_cyborg_encounter
    set:
      chen_contact: 1
      ally_cyborg: 1
      protection_alliance: 1
