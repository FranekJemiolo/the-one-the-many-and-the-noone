id: ch37_chapter_end
content:
  - type: text
    value: |
      The chapter ends with the endgame beginning. The transformation is accelerating, the system preparing to finalize its adaptation to multiplicity.
      Sava explained that the boundaries between versions are stabilizing, the enhanced accessibility of multiplicity becoming permanent, the new configuration of reality locking in.
      The transformation will take days or weeks, and after it's complete, the new configuration will be irreversible.
  - type: pause
    duration: 1000
  - type: text
    value: |
      Sava asked if you're ready for the permanent restructuring of reality. You've been living with multiplicity for years—you're prepared.
      But permanent is different from temporary. After the endgame, there's no going back to the old configuration.
  - type: pause
    duration: 800
  - type: text
    value: |
      Mira is still your anchor. If you stayed, she's building a life with you, your love enduring through the years, the threshold, the convergence, the beginning endgame.
      If you shifted, she's building a life in this version while you build yours in another, connected across the multiplicity by the love you share.
  - type: pause
    duration: 1000
  - type: text
    value: |
      Dr. Kaczmarek is still your ally—checking in on you, supporting your journey, going against the system he works for.
      He believes in understanding. He believes your perception is real. He's willing to help you find answers.
  - type: pause
    duration: 800
  - type: text
    value: |
      Sava Illich has been your guide through the threshold—helping you understand your perception, navigate the choice, live with the consequences.
      Now she's witnessing the endgame begin, the final phase of the transformation that will make the new configuration of reality permanent.
  - type: pause
    duration: 1000
  - type: text
    value: |
      This is the continuation of the convergence phase. Identity is crystallizing. The cracks in reality have widened. The system has restructured and stabilized.
      The endgame has begun—and it will finalize everything.
choices:
  - text: "Continue to Chapter 38"
    goto: chapter_38
    set:
      chapter_37_completed: 1
