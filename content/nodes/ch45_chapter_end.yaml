id: ch45_chapter_end
content:
  - type: text
    value: |
      The story is nearly complete. You've lived through the legal battle, the threshold, the convergence, the endgame.
      You've made your choice about which version of reality to inhabit, and you've built a life in that version.
      You've learned that who you are is more complicated than a name—that you're a person with unusual perception who fought for your right to exist.
  - type: pause
    duration: 1000
  - type: text
    value: |
      Mira is still your anchor—or connected across versions by the love you share.
      Dr. Kaczmarek is still your ally—checking in on you, supporting your journey, going against the system he works for.
      Sava Illich has been your guide through the threshold—now she's a colleague, someone who understands what it means to live with multiplicity.
  - type: pause
    duration: 800
  - type: text
    value: |
      The legal battle you fought established rights for people like you. The precedent you set has helped countless others across all versions.
      You've become a bridge between realities, helping others who are developing unusual perception understand what they're experiencing.
      You've found belonging, acceptance, purpose—whether in this version with Mira, or in the new version with a community where multiplicity is the norm.
  - type: pause
    duration: 1000
  - type: text
    value: |
      Aleksy Wrona. That's your name. That's who you are supposed to be.
      But you've learned that who you are is more complicated than that. You're a person with unusual perception who fought for your right to exist, who made a choice about which version of reality to inhabit, who is building a life in that version.
      And with Mira by your side—or connected across versions—you've learned that's enough.
choices:
  - text: "Continue to Chapter 46"
    goto: chapter_46
    set:
      chapter_45_completed: 1
