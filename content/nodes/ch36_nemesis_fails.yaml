id: ch36_nemesis_fails
content:
  - type: text
    value: |
      The convergence has stabilized, and now the endgame is approaching. The system has completed its restructuring, and the final phase of the transformation is beginning.
      Sava calls with an update. "The convergence is complete. The system has restructured to accommodate multiplicity more fully."
      "What happens now?"
      "Now the endgame begins. The system will finalize its adaptation to multiplicity. The transformation will reach its terminal state."
  - type: pause
    duration: 800
  - type: text
    value: |
      "What does that mean for me?"
      "It means the configuration of reality will become permanent. The new accessibility of multiplicity will become the default, not a temporary state."
      She pauses. "The legal battle established your rights. The threshold gave you the freedom to choose. The convergence transformed reality. Now the endgame will finalize everything."
  - type: pause
    duration: 800
  - type: text
    value: |
      "Is there anything I need to do?"
      "No. The endgame is a system-level transformation. You've already made your choices. You've already adapted to the new configuration."
      She meets your eyes. "The endgame is about the system, not about you. You've done your part. Now the system will do its part."
  - type: pause
    duration: 1000
  - type: text
    value: |
      "And after the endgame?"
      "After the endgame, the transformation will be complete. The new configuration of reality will be permanent. Multiplicity will be fully accommodated."
      She pauses. "You'll be able to live your life in the version you chose, with the enhanced accessibility of multiplicity as a permanent feature of reality."
choices:
  - text: "Continue to Chapter 37"
    goto: ch36_chapter_end
    set:
      endgame_approaching: 1
