id: ch16_identity_failure
content:
  - type: text
    value: "You observe the identity failure. You try to remember who you are, but the memory cannot crystallize. You know you exist, but you cannot define what that means."
  - type: pause
    duration: 800
  - type: text
    value: "This is not amnesia. You have access to your memories. The problem is that the memories cannot be organized into a coherent identity."
  - type: pause
    duration: 800
  - type: text
    value: "Identity requires interpretation. You need to interpret your memories as a continuous self. But in the Null Zone, interpretation fails. The memories exist, but they cannot be woven into identity."
  - type: pause
    duration: 1000
  - type: text
    value: "You realize this is what happens when the interpretation field collapses completely. Reality exists, but it cannot be understood. Memories exist, but they cannot become identity."
choices:
  - text: "Observe the Null Child's appearance"
    goto: ch16_null_child_appearance
