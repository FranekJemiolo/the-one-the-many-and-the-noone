id: ch38_chapter_end
content:
  - type: text
    value: |
      The chapter ends with the endgame progressing. Days have passed, and the transformation is accelerating—the boundaries between versions are becoming more stable, the enhanced accessibility of multiplicity becoming more permanent.
      Sava reported that the transformation is progressing faster than expected, the new configuration stabilizing rapidly.
      The endgame is almost complete.
  - type: pause
    duration: 1000
  - type: text
    value: |
      When the endgame is complete, the new configuration of reality will be permanent. The enhanced accessibility of multiplicity will be irreversible.
      You'll be able to live your life in the version you chose, with the enhanced accessibility of multiplicity as a permanent feature of reality.
      Mira will be able to live her life in the version she chose, with the enhanced accessibility of multiplicity as a permanent feature of reality.
  - type: pause
    duration: 800
  - type: text
    value: |
      Mira is still your anchor. If you stayed, she's building a life with you, your love enduring through the years, the threshold, the convergence, the progressing endgame.
      If you shifted, she's building a life in this version while you build yours in another, connected across the multiplicity by the love you share.
  - type: pause
    duration: 1000
  - type: text
    value: |
      Dr. Kaczmarek is still your ally—checking in on you, supporting your journey, going against the system he works for.
      He believes in understanding. He believes your perception is real. He's willing to help you find answers.
  - type: pause
    duration: 800
  - type: text
    value: |
      Sava Illich has been your guide through the threshold—helping you understand your perception, navigate the choice, live with the consequences.
      Now she's witnessing the endgame progress, the transformation nearly finalized.
  - type: pause
    duration: 1000
  - type: text
    value: |
      This is the continuation of the convergence phase. Identity is crystallizing. The cracks in reality have widened. The system has restructured and stabilized.
      The endgame is progressing—and it will finalize everything soon.
choices:
  - text: "Continue to Chapter 39"
    goto: chapter_39
    set:
      chapter_38_completed: 1
