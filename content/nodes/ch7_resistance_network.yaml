id: ch7_resistance_network
content:
  - type: text
    value: "You recognize the pattern. This is not the first time contradiction has been injected. It has been happening throughout the anomalies."
  - type: pause
    duration: 1000
  - type: text
    value: "The Witness's multiple versions. The Patient's emotional-causal split. The Guard's acceptance of temporal instability. The cyborg's memory multiplicity. The shared dual-reality memory."
  - type: pause
    duration: 800
  - type: text
    value: "These were not random anomalies. They were the Resistance's work—deliberate injections of multiplicity into a system that wants compression."
  - type: pause
    duration: 800
  - type: text
    value: "The Resistance is not an organization. It is a method. It is the practice of reintroducing contradiction into a world that no longer generates it naturally."
  - type: pause
    duration: 1000
  - type: text
    value: "You write in your notebook: 'Resistance network identified. Method: contradiction injection. Purpose: preserve interpretive multiplicity against Engine compression.'"
choices:
  - text: "Conclude the chapter"
    goto: ch7_chapter_end
