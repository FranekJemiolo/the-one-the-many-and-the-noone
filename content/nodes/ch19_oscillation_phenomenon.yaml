id: ch19_oscillation_phenomenon
content:
  - type: text
    value: |
      The aftermath of the legal victory is strange. You expected to feel triumphant, to feel a sense of final closure.
      Instead, you feel hollow. The battle is over, but the war continues—the war for your right to exist as who you are in a world that still doesn't understand your perception.
  - type: pause
    duration: 800
  - type: text
    value: |
      The damages payment is substantial. You could live comfortably for years. But money doesn't change how people see you. It doesn't change the fact that your perception is still developing, still becoming more complex.
      The legal victory established rights, but it didn't change reality.
  - type: pause
    duration: 800
  - type: text
    value: |
      Mira is celebrating, but she senses your ambivalence. "You won. You should be happy."
      "I am happy. But I also feel... unfinished. Like this was just one battle in a longer war."
      She nods. "Because it was. The legal battle is over, but the personal journey continues."
  - type: pause
    duration: 1000
  - type: text
    value: |
      Dr. Kaczmarek calls to congratulate you. "This is a significant victory. The precedent you've set will help countless people."
      "I know. But I still feel like there's more to understand about my perception. More to figure out."
      "There always is. Perception isn't static. It develops. It evolves. The legal victory gave you rights, but it didn't give you answers."
  - type: pause
    duration: 800
  - type: text
    value: |
      He pauses. "If you want to continue exploring your perception, I can help. Off the books, outside the legal framework. Just research, understanding, exploration."
      "I'm interested. What did you have in mind?"
      "There's someone I want you to meet. Someone who experiences reality differently than most people. Someone who might help you understand what you're going through."
choices:
  - text: "Agree to meet Dr. Kaczmarek's contact"
    goto: ch19_meeting_arranged
    set:
      dr_kaczmarek_trust: 90
      sava_introduction: 1
  - text: "Decline, focus on personal healing after the legal battle"
    goto: ch19_healing_focus
    set:
      aleksy_detachment: 60
      mira_trust: 100
