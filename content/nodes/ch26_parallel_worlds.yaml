id: ch26_parallel_worlds
content:
  - type: text
    value: |
      You observe the parallel worlds, watching as the stalemate between causal and emotional interpretation transforms into a structural split. You and Mira are occupying the same physical space, standing in the same location at the same time.
      But you are experiencing different realities, each interpretation engine generating a complete world that the other cannot access.
  - type: pause
    duration: 800
  - type: text
    value: |
      In Aleksy's world, the causal sequence is clear, events following a linear chain of cause and effect that makes sense according to the rules of logical progression. In Mira's world, the emotional sequence is clear, events following a pattern of feeling and meaning that makes sense according to the rules of emotional experience.
      Both worlds are equally real, both equally valid interpretations of the same physical reality. Neither can access the other, each interpretation engine generating a complete world that excludes the other.
  - type: pause
    duration: 800
  - type: text
    value: |
      This is not a hallucination, not a psychological breakdown where you and Mira are experiencing delusions. Both worlds are equally valid interpretations of the same physical reality, each coherent within its own framework.
      The split has become structural, the two interpretation engines no longer able to communicate or reconcile their different versions of reality.
  - type: pause
    duration: 1000
  - type: text
    value: |
      You realize this is what happens when the emotional-causal oscillation breaks. The system does not return to shared interpretation, does not restore the ability to experience both causal and emotional truth simultaneously.
      It collapses into parallel interpretation engines, each generating its own complete world that excludes the other.
choices:
  - text: "Understand the interpretive divergence"
    goto: ch26_interpretive_divergence
  - text: "Ask about communication across parallel realities"
    goto: ch26_parallel_communication
    set:
      communication_interest: 1
