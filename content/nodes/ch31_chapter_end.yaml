id: ch31_chapter_end
content:
  - type: text
    value: |
      The chapter ends with identity crystallization. Years have passed since your threshold choice, and your identity has solidified around the life you've built.
      If you chose to stay, you're Aleksy Wrona—someone who fought for the right to exist in this version, who chose to stay with Mira, who is building a life as a bridge between realities.
      If you chose to shift, you're Aleksy Wrona—someone who fought for the right to exist, who chose to shift to a version where multiplicity is the norm, who is building a life in that version.
  - type: pause
    duration: 1000
  - type: text
    value: |
      Either way, identity has crystallized. You feel more solid, more certain of who you are.
      But you also feel more multiple. You're not just one person in one version—you're a pattern that exists across multiple realities, anchored in one but connected to others.
      Identity isn't singular anymore. It's multiplicity that has crystallized into a stable form.
  - type: pause
    duration: 800
  - type: text
    value: |
      Mira is still your anchor. If you stayed, she's building a life with you, your love enduring through the years.
      If you shifted, she's building a life in this version while you build yours in another, connected across the multiplicity by the love you share.
  - type: pause
    duration: 1000
  - type: text
    value: |
      Dr. Kaczmarek is still your ally—checking in on you, supporting your journey, going against the system he works for.
      He believes in understanding. He believes your perception is real. He's willing to help you find answers.
  - type: pause
    duration: 800
  - type: text
    value: |
      Sava Illich has been your guide through the threshold—helping you understand your perception, navigate the choice, live with the consequences.
      She's a mirror who showed you what you're becoming, challenged you to think about where you belong, helped you find your path forward.
  - type: pause
    duration: 1000
  - type: text
    value: |
      The Guard has crystallized into Barrier—a named multiplicity that protects the boundaries between realities.
      But you've learned that who you are is more complicated than that—and that's okay.
choices:
  - text: "Continue to Chapter 32"
    goto: chapter_32
    set:
      chapter_31_completed: 1
