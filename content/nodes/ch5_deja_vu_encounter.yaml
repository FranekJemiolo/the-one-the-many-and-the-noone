id: ch5_deja_vu_encounter
content:
  - type: text
    value: "You and Mira are sitting in the same room. This is not unusual. What is unusual is that you are both experiencing deja vu about the same moment."
  - type: pause
    duration: 800
  - type: text
    value: "The feeling is precise: you have been here before. Not in a general sense. Specifically. This exact conversation. This exact configuration of light and shadow."
  - type: pause
    duration: 800
  - type: text
    value: "Mira looks at you. She feels it too. But when you compare notes, something impossible emerges."
  - type: pause
    duration: 800
  - type: text
    value: "\"I remember this,\" you say. \"You said something about the light changing. Then I responded about the time.\""
  - type: pause
    duration: 1000
  - type: text
    value: "Mira shakes her head. \"I remember this too. But I said something about the feeling of the room. Then you responded about the emotional weight.\""
  - type: pause
    duration: 800
  - type: text
    value: "Both memories feel equally authentic. Both describe the same moment. But they are incompatible."
choices:
  - text: "Analyze from Aleksy's causal perspective"
    goto: ch5_aleksy_perspective
    set:
      aleksy_dominance: 1
  - text: "Analyze from Mira's emotional perspective"
    goto: ch5_mira_perspective
    set:
      mira_dominance: 1
