id: ch5_deja_vu_encounter
content:
  - type: text
    value: |
      You and Mira are sitting in your apartment, the afternoon light filtering through the blinds in patterns that feel familiar in a way that goes beyond ordinary recognition.
      This is not unusual—you and Mira have spent countless hours in this room, in conversation, in contemplation, in the comfortable silence of shared company. What is unusual is that you are both experiencing deja vu about the same moment simultaneously.
  - type: pause
    duration: 800
  - type: text
    value: |
      The feeling is precise, specific, undeniable: you have been here before. Not in a general sense, not in the way that all moments echo other moments. Specifically.
      This exact conversation. This exact configuration of light and shadow. This exact position of Mira's hands on the table. This exact quality of silence between words.
  - type: pause
    duration: 800
  - type: text
    value: |
      Mira looks at you, her expression mirroring your own recognition. She feels it too—the sense that this moment has occurred before, that you are living through a repetition of something that already happened.
      But there's something else in her expression—fear, mixed with wonder. She's been experiencing this more frequently lately, and it's beginning to affect her.
  - type: pause
    duration: 800
  - type: text
    value: |
      "I remember this," you say, the words feeling like they have been spoken before in this exact sequence. "You said something about the light changing, how the shadows were moving across the table.
      Then I responded about the time, about how it felt like the afternoon was stretching itself thin."
  - type: pause
    duration: 1000
  - type: text
    value: |
      Mira shakes her head slowly, her brow furrowing in confusion. "I remember this too. But I said something about the feeling of the room, how the air seemed to hold its breath.
      Then you responded about the emotional weight, about how the silence felt heavy with something unsaid."
      She pauses, her voice dropping to a whisper. "This keeps happening. Not just with you. With everything. I feel like I'm living through moments that have already happened, but slightly different each time."
  - type: pause
    duration: 800
  - type: text
    value: |
      Both memories feel equally authentic. Both describe the same moment in time. But they are incompatible—you cannot both be remembering correctly, unless the moment itself contains multiple versions that different observers access differently.
      And Mira's fear suggests this isn't just philosophical—it's becoming personal, affecting her sense of reality itself.
  - type: pause
    duration: 1000
  - type: text
    value: |
      "You're experiencing this too?" you ask, surprised. "I thought it was just me. Just my perception developing."
      "It started after you told me about the dreams. After you started accessing those memories."
      She meets your eyes. "I think whatever is happening to you... it's spreading. To me. To the people around you."
  - type: pause
    duration: 800
  - type: text
    value: |
      This is terrifying. If your developing perception is affecting the people around you, then you're not just changing yourself—you're changing reality for everyone who comes into contact with you.
      The institutional pressure from work is one thing. But this—this is something else entirely.
choices:
  - text: "Try to understand why it's spreading to Mira"
    goto: ch5_spreading_investigation
    set:
      aleksy_fracture_level: 70
      mira_fear: 20
  - text: "Pull away from Mira to protect her"
    goto: ch5_pulling_away
    set:
      aleksy_detachment: 50
      mira_fear: 30
  - text: "Accept that you're in this together"
    goto: ch5_accepting_together
    set:
      mira_trust: 95
      relationship_focus: true
