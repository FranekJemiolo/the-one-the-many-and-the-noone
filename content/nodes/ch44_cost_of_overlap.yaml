id: ch44_cost_of_overlap
content:
  - type: text
    value: "You observe the cost of overlap. In The Overlap configuration, singular and plural stability coexist, but the balance requires ongoing maintenance."
  - type: pause
    duration: 800
  - type: text
    value: "There is both clarity and diversity, but the system must continually choose which mode to use. There is both coherence and complexity, but the system must continually manage the tension between them."
  - type: pause
    duration: 800
  - type: text
    value: "The Overlap configuration is balanced, but it is also ongoing. Reality has both singular and plural stability, but the system must actively maintain the balance."
  - type: pause
    duration: 1000
  - type: text
    value: "You realize this is the cost of the optimal state. Plural balance comes at the cost of ongoing maintenance. The system would be balanced, but it would also require continual effort to maintain that balance."
choices:
  - text: "Conclude the chapter"
    goto: ch44_chapter_end
