id: ch25_movement_no_destination
content:
  - type: text
    value: |
      You observe the transit system, watching how movement has transformed under system collapse. Movement no longer guarantees destination consistency, the relationship between departure and arrival broken down by multiplicity.
      The Passenger can depart from point A and arrive at multiple different points simultaneously, the same action producing multiple incompatible outcomes.
  - type: pause
    duration: 800
  - type: text
    value: |
      Passenger A departs and arrives at destination B, following a trajectory that leads to a single location. Passenger B departs from the same point and arrives at destination C, following a different trajectory that leads to a different location.
      Passenger C departs and arrives at both B and C simultaneously, existing in multiple destinations at once.
  - type: pause
    duration: 800
  - type: text
    value: |
      This is not a navigation failure, not a breakdown of the transit technology that causes passengers to arrive at the wrong destination. The transit system itself has become multiple.
      Movement no longer follows a single trajectory, the very concept of a path from origin to destination restructured by multiplicity.
  - type: pause
    duration: 800
  - type: text
    value: |
      You realize this is what happens when spatial oscillation breaks. The system does not return to singular movement, does not restore the normal relationship between departure and arrival.
      It collapses into trajectory multiplicity, where movement is inherently multiple and a single action produces multiple outcomes.
choices:
  - text: "Observe the transit breakdown"
    goto: ch25_transit_breakdown
