id: ch15_rose_appearance
content:
  - type: text
    value: |
      Two weeks after the letter from your supervisor, you receive a call from Dr. Kaczmarek. He sounds urgent.
      "The company is moving faster than expected. They're preparing to file a motion to dismiss your case before it even reaches court."
      "Can they do that?"
  - type: pause
    duration: 800
  - type: text
    value: |
      "They can try. They'll argue that your claims are without merit, that your perception doesn't qualify for protection under any existing framework."
      He pauses. "We need to respond quickly. We need to file a counter-motion demonstrating that your case has legal basis."
  - type: pause
    duration: 800
  - type: text
    value: |
      "What do you need from me?"
      "Documentation. Evidence. Anything that demonstrates your perception is real, that it affects your experience of reality, that it qualifies for protection."
      He pauses. "And I need you to decide on the disability framework. Elena needs to know whether we're pursuing that angle."
  - type: pause
    duration: 1000
  - type: text
    value: |
      You consider this. The disability framework feels like a betrayal of your perception—like accepting the system's narrative that you're broken.
      But it's also the strongest legal option. It might be the only way to fight back effectively.
      Mira is watching you. "What do you think?"
  - type: pause
    duration: 800
  - type: text
    value: |
      "I don't want to be labeled disabled. I don't want to be pathologized."
      "But you also don't want to lose this fight."
      She takes your hand. "Whatever you decide, I support you. But remember: this isn't about who you are. It's about winning the right to exist as who you are."
choices:
  - text: "Accept the disability framework for legal leverage"
    goto: ch15_disability_accepted
    set:
      legal_conflict: 1
      disability_framing: 1
  - text: "Refuse, pursue alternative legal strategy"
    goto: ch15_disability_refused
    set:
      legal_conflict: 1
      self_acceptance: 1
