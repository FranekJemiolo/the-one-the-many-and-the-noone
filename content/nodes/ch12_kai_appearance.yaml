id: ch12_kai_appearance
content:
  - type: text
    value: |
      Two weeks after the joint documentation session, you receive an unexpected call from HR. They want you to come in for a meeting with the company's legal counsel.
      Mira insists on going with you. "I'm not letting you face this alone."
  - type: pause
    duration: 800
  - type: text
    value: |
      The legal counsel's office is in a different building than Dr. Kaczmarek's—more formal, more imposing, with security at the entrance and a receptionist who checks your ID before letting you in.
      The counsel herself is sharp, professional, with a manner that suggests she's handled cases like this before.
  - type: pause
    duration: 800
  - type: text
    value: |
      "Aleksy Wrona," she says, not looking up from her file. "We've been reviewing the documentation from Dr. Kaczmarek's sessions."
      "And?"
      "And we have concerns. Specifically about the transferability of your perception. About the possibility that it could affect other employees."
  - type: pause
    duration: 1000
  - type: text
    value: |
      "What kind of concerns?"
      "Liability concerns. Safety concerns. Stability concerns."
      She finally looks up. "If your perception can spread, if it can affect the reality of people around you, then you represent a potential risk to the company."
      "I'm not a risk. I'm trying to understand what's happening to me."
  - type: pause
    duration: 800
  - type: text
    value: |
      "From the company's perspective, that doesn't matter. What matters is whether you're a liability."
      She opens a folder on her desk. "We're prepared to offer you a separation package. Generous terms. In exchange for your agreement to certain conditions."
      "What conditions?"
  - type: pause
    duration: 1000
  - type: text
    value: |
      "Confidentiality. Non-disclosure. An agreement not to discuss your perception with anyone outside of approved medical professionals."
      She pauses. "And an agreement to submit to regular monitoring. To ensure that your perception isn't spreading to other employees."
      Mira speaks up for the first time. "That's not acceptable. You're asking him to let you monitor him like he's a criminal."
  - type: pause
    duration: 800
  - type: text
    value: |
      "We're asking him to accept reasonable conditions in exchange for a generous separation package," the counsel says. "The alternative is termination for cause. Based on the documentation, we have grounds to argue that your behavior constitutes a workplace hazard."
      The threat is clear. Accept the package and the conditions, or be fired and potentially sued.
choices:
  - text: "Accept the separation package and conditions"
    goto: ch12_separation_accepted
    set:
      institutional_pressure: 60
      employment_terminated: 1
  - text: "Refuse and prepare for legal battle"
    goto: ch12_separation_refused
    set:
      institutional_pressure: 70
      legal_conflict: 1
