id: ch5_chapter_end
content:
  - type: text
    value: |
      You and Mira sit in silence, the afternoon light continuing to shift across the room in patterns that now feel different—not because the light has changed, but because you both know the room can be multiple.
      The physical space is the same, but your experience of it has fundamentally shifted. You can no longer see reality as singular.
  - type: pause
    duration: 1000
  - type: text
    value: |
      This is the end of Part I. Stable reality has broken down. The cracks are no longer subtle anomalies that can be dismissed or explained away. They are structural features of reality itself.
      The assumption that reality must be singular, that moments happen one way, that memory records what actually happened—this assumption has been irrevocably shattered.
  - type: pause
    duration: 800
  - type: text
    value: |
      Memory divergence, where multiple versions of the same moment coexist. Emotional-causal split, where different ways of experiencing the present operate independently. Temporal instability, where multiple timelines exist simultaneously.
      Causal duplication, where a single entity can contain multiple contradictory pasts. Shared dual-reality memory, where two observers experience the same moment differently together.
  - type: pause
    duration: 800
  - type: text
    value: |
      Reality is not just producing anomalies. It is reconfiguring itself into a multiplicity system, revealing its true nature as fundamentally plural.
      The breakdown of stable reality is not a problem to be fixed—it is a transformation to be understood.
  - type: pause
    duration: 1000
  - type: text
    value: |
      You and Mira are no longer observers of the breakdown. You are participants in it. You have experienced the same moment differently, and you have accepted that both versions are true.
      The next phase will not be about discovering anomalies. It will be about the systems that emerge to manage them. Interpretation engines are about to become visible.
choices:
  - text: "Continue to Chapter 6"
    goto: chapter_6
