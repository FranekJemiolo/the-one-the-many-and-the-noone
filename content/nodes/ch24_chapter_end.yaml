id: ch24_chapter_end
content:
  - type: text
    value: "You leave the educational zone. The Teacher continues to teach multiple truths simultaneously. The students learn all versions as valid."
  - type: pause
    duration: 1000
  - type: text
    value: "This is not a breakdown of education. It is an evolution of knowledge transmission. The system has adapted to knowledge multiplicity and found a way to function within it."
  - type: pause
    duration: 800
  - type: text
    value: "You realize the Engine's fear is unfounded. Knowledge multiplicity is not chaos. It is a different way of knowing that the Engine cannot control, but that functions perfectly well."
  - type: pause
    duration: 800
  - type: text
    value: "The collapse of singular knowledge has not destroyed education. It has transformed it into something the Engine cannot recognize as valid, but that works nonetheless."
  - type: pause
    duration: 1000
  - type: text
    value: "This continues the pattern. Oscillation breaks not into chaos, but into new states of multiplicity that the Engine cannot control but that function anyway."
choices:
  - text: "Continue to Chapter 25"
    goto: chapter_25
