id: ch24_chapter_end
content:
  - type: text
    value: |
      The chapter ends with your conversation with Mira about her resonant perception.
      If you discussed creating distance, Mira rejected the idea—she fought for you through the legal battle, and she's not going to let perception development scare her away from your relationship.
      You realized she's right. Trying to protect her by distancing yourself would only hurt both of you.
  - type: pause
    duration: 1000
  - type: text
    value: |
      If you discussed supporting her, you committed to facing the perception development together—guiding her through the multiplicity, trusting that your connection is strong enough to survive the challenges ahead.
      Mira affirmed her trust in you, in your relationship, in your ability to navigate whatever comes.
  - type: pause
    duration: 800
  - type: text
    value: |
      Either way, the conversation resolved into commitment. You won't distance yourself from Mira. You'll face the perception development together.
      The possibility that you might end up in different versions of reality remains, but you're facing it as a team.
  - type: pause
    duration: 800
  - type: text
    value: |
      Mira is still your anchor. The love you confessed in Chapter 8 is solid, lasting, the foundation for everything that comes next.
      She's not afraid of the multiplicity—she's afraid of losing you. And you're not going to let that happen.
  - type: pause
    duration: 1000
  - type: text
    value: |
      Dr. Kaczmarek is still your ally—connecting you with Sava, supporting your exploration, going against the system he works for.
      He believes in understanding. He believes your perception is real. He's willing to help you find answers.
  - type: pause
    duration: 800
  - type: text
    value: |
      This is the continuation of Part III. The legal battle is won, but the personal journey continues.
      The cracks in reality are widening. The system is responding. The convergence is approaching.
      And Sava Illich is becoming a mirror—showing you what you're becoming, challenging you to think about your connection to Mira.
choices:
  - text: "Continue to Chapter 25"
    goto: chapter_25
    set:
      chapter_24_completed: 1
