id: ch7_divergence_stabilized
content:
  - type: text
    value: |
      You sit with both explanations, the official narrative and the injected contradiction spread before you on the desk. Both feel equally valid, equally authentic, equally true in their own domains.
      The official narrative is clean, simple, comfortable. The injected contradiction is complex, ambiguous, unsettling. Yet both describe the same event, and both feel accurate.
  - type: pause
    duration: 1000
  - type: text
    value: |
      This is not a choice between truth and falsehood. It is a choice between compression and divergence. The Engine wants you to choose one, to collapse the multiplicity into a single narrative that the system can tolerate.
      The Resistance wants you to hold both, to maintain the divergence even when it feels uncomfortable, to preserve multiplicity as a structural feature of reality.
  - type: pause
    duration: 800
  - type: text
    value: |
      You realize something important: divergence is not instability. Divergence is stability of a different kind. When multiple interpretations coexist, reality becomes more resilient, not less.
      The system can adapt to different perspectives, can accommodate different truths, can remain functional even when not everyone agrees on what happened.
  - type: pause
    duration: 800
  - type: text
    value: |
      The injection was not an attack on truth. It was an expansion of truth. The Resistance is not fighting reality—it is preserving multiplicity, ensuring that reality remains multiple rather than being compressed into singularity.
      The Resistance is not the enemy of truth. The Resistance is the guardian of multiplicity.
choices:
  - text: "Recognize the Resistance network"
    goto: ch7_resistance_network
