id: ch24_knowledge_center
content:
  - type: text
    value: |
      "Propose establishing a knowledge multiplicity training center," you suggest to the students and Teacher. "The educational zone can serve as a hub for knowledge multiplicity adaptation, bringing people here to experience multiple truths and develop the capacity to hold plural truth."
      "This would accelerate the spread of knowledge multiplicity perception across the system."
  - type: pause
    duration: 800
  - type: text
    value: |
      The students and Teacher agree. "The zone has the infrastructure to support training, and our experience with adaptation can guide others through the process."
      "We can develop protocols for systematic knowledge multiplicity training."
  - type: pause
    duration: 800
  - type: text
    value: |
      "The training center would need to be connected to the broader Resistance networks," you observe. "The sanctuary network, the temporal training network, the other infrastructure can coordinate with the knowledge multiplicity training center."
      "This would create a comprehensive system for multiplicity adaptation."
  - type: pause
    duration: 1000
  - type: text
    value: |
      The students and Teacher agree. "We'll establish the training center and connect it to the Resistance networks. The knowledge multiplicity adaptation will become part of the integrated multiplicity infrastructure."
      "This will significantly increase the system's capacity to function in plural truth."
choices:
  - text: "Support establishing the knowledge training center"
    goto: ch24_knowledge_establishment
    set:
      knowledge_center: 1
      establishment_chosen: 1
