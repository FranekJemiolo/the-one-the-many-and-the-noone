id: ch22_time_no_longer_linear
content:
  - type: text
    value: |
      You return to Geostation Three, the research station where temporal anomalies were first observed. The temporal instability has progressed beyond oscillation, beyond the back-and-forth between different sequences.
      Time is no longer linear locally, has ceased to function as a single directed line.
  - type: pause
    duration: 800
  - type: text
    value: |
      The clocks are not just showing different sequences, not merely disagreeing about the order of events. They are showing all sequences simultaneously. 14:03, 14:04, 14:05—all present at once, all equally real, all equally accessible.
      The distinction between past, present, and future has collapsed, the timeline becoming a field where all moments coexist.
  - type: pause
    duration: 800
  - type: text
    value: |
      This is not a display malfunction, not a failure of the clocks to synchronize. Time itself has ceased to be linear in this zone, has lost its directional quality. Past, present, and future are coexisting without sequence, without the normal ordering that makes causality possible.
      The zone has become a temporal field where all moments are equally present.
  - type: pause
    duration: 800
  - type: text
    value: |
      The researchers are still working, still engaged in their research activities. But they are experiencing time as a field rather than a line, moving through moments without a fixed order.
      They can access any moment in the local timeline without traversing the intervening moments, experiencing time as a landscape rather than a path.
choices:
  - text: "Observe the temporal breakdown"
    goto: ch22_temporal_breakdown
