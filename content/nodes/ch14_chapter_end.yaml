id: ch14_chapter_end
content:
  - type: text
    value: |
      The chapter ends with you reflecting on the letter from your former supervisor.
      If you responded, you feel a sense of closure—a small human connection in the middle of institutional erasure.
      It reminds you that the system is made of people, not just faceless bureaucracy. That changes how you feel about fighting back.
  - type: pause
    duration: 1000
  - type: text
    value: |
      If you ignored the letter, you're focused on the legal fight—determined to win without compromise, but aware of Mira's warning about dehumanization.
      Fighting the system can change you. It can make you see the other side as enemies rather than people.
  - type: pause
    duration: 800
  - type: text
    value: |
      Either way, the institutional conflict is established. The company has pushed you out, erased your presence, tried to control your narrative.
      But you're still here. You still have allies. You still have the will to fight.
  - type: pause
    duration: 800
  - type: text
    value: |
      Dr. Koval's method is disturbing: controlled falsehoods as system architecture.
      Truth becomes a variable, something to be managed rather than discovered.
      Mira is still your anchor. Chapter 8 is solid, lasting, the foundation for everything that comes next.
      She's reminding you to maintain your humanity, to remember that the system is made of people, to not let the fight change who you are.
  - type: pause
    duration: 1000
  - type: text
    value: |
      Dr. Kaczmarek is still your ally—documenting your case off the books, connecting you with resources, going against the system he works for.
      He believes in understanding. He believes your perception is real. He's willing to risk his position to help you.
  - type: pause
    duration: 800
  - type: text
    value: |
      This is the continuation of Part II escalation. The institutional conflict is humanized but unresolved.
      The cracks in reality are widening. The system is responding. The convergence is approaching.
      And you're starting to realize: this fight is about more than your perception. It's about the right to exist as who you are in a system that demands conformity.
choices:
  - text: "Continue to Chapter 15"
    goto: chapter_15
    set:
      chapter_14_completed: 1
