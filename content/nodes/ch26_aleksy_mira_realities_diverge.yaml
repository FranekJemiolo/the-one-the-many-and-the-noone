id: ch26_aleksy_mira_realities_diverge
content:
  - type: text
    value: |
      The weeks after your decision with Sava are difficult. If you chose to wait for Mira, you're feeling the strain of maintaining stability at the threshold.
      Your perception is becoming more unstable. The dreams are more vivid. The temporal perception is more pronounced. The sense of self is starting to fracture.
  - type: pause
    duration: 800
  - type: text
    value: |
      If you chose to prioritize stability, you're feeling the guilt of making your choice alone. Mira is supportive but distant, sensing that you're preparing to move forward without her.
      The tension between your stability and your connection is growing.
  - type: pause
    duration: 800
  - type: text
    value: |
      Either way, the threshold is approaching. Sava calls with an update. "Your perception is at the threshold. The multiplicity is fully accessible. You can see all versions simultaneously. You can move between them."
      "What do I do?"
      "You choose. You choose which version to make your home."
  - type: pause
    duration: 1000
  - type: text
    value: |
      "How do I choose?"
      "You choose based on what feels like home. Which version feels most like you? Which version has the people you love? Which version has the life you want to live?"
      She pauses. "The choice is personal. There's no right answer. But you have to make it soon. The longer you wait, the greater the risk."
choices:
  - text: "Choose to stay in this version with Mira"
    goto: ch26_stay_choice
    set:
      threshold_reached: 1
      stay_choice: 1
  - text: "Choose to shift to a version where perception is the norm"
    goto: ch26_shift_choice
    set:
      threshold_reached: 1
      shift_choice: 1
