id: ch19_divergence_injection
content:
  - type: text
    value: |
      You understand the divergence injection, seeing how the Resistance has developed a more sophisticated approach to contradiction. The Resistance is not just reintroducing contradiction, not simply adding multiple interpretations to compressed zones.
      It is doing so in a way that makes the contradictions uncompressible, resistant to the Engine's methods of elimination.
  - type: pause
    duration: 800
  - type: text
    value: |
      The Engine tries to compress the contradictions into a single interpretation, to eliminate the multiplicity and restore singularity. But the Resistance designs the contradictions so that compression is impossible without losing essential meaning.
      The contradictions are structured such that any attempt to compress them would require discarding information that is necessary for the interpretation to remain meaningful.
  - type: pause
    duration: 800
  - type: text
    value: |
      This forces the Engine into a difficult choice: either accept multiplicity, allowing multiple incompatible truths to coexist, or lose meaning, compressing the interpretation to the point where it no longer accurately describes reality.
      The Engine chooses to lose meaning, which creates the instability you observe—the oscillation between singular and multiple states.
  - type: pause
    duration: 1000
  - type: text
    value: |
      You realize this is the Resistance's strength. It can force the Engine into a position where compression requires meaning loss, which makes compression unacceptable even to the Engine.
      By structuring contradictions so that they cannot be compressed without destroying meaning, the Resistance creates a situation where the Engine's own preference for meaningful interpretation works against its preference for singularity.
choices:
  - text: "Conclude the chapter"
    goto: ch19_chapter_end
