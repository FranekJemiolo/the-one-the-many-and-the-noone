id: ch16_null_child_appearance
content:
  - type: text
    value: |
      The counter-motion is filed. Elena Vance argues that your perception qualifies for protection under the ADA, that it substantially limits major life activities, that the company failed to provide reasonable accommodation.
      The company responds with a barrage of legal arguments—challenging the medical evidence, questioning the validity of your perception, arguing that you're not disabled but simply non-compliant.
  - type: pause
    duration: 800
  - type: text
    value: |
      The legal battle is exhausting. Every day brings new motions, new arguments, new attempts to undermine your case.
      But you're not fighting alone. Elena is tireless. Dr. Kaczmarek is providing expert testimony. Mira is supporting you through every setback.
  - type: pause
    duration: 800
  - type: text
    value: |
      Three months in, the court schedules a hearing on the motion to dismiss. This is the first major test—whether your case will be allowed to proceed or thrown out before reaching trial.
      "This is critical," Elena says. "If the court grants their motion, we're done. If it denies it, we proceed to discovery."
  - type: pause
    duration: 1000
  - type: text
    value: |
      The hearing is tense. The company's attorney is sharp, experienced, arguing that your perception is not a disability but a choice, that you're refusing to comply with reasonable workplace requirements.
      Elena counters with medical evidence, with Dr. Kaczmarek's testimony, with the argument that your perception is involuntary and beyond your control.
  - type: pause
    duration: 800
  - type: text
    value: |
      The judge listens, takes notes, asks questions. You can't tell which way they're leaning.
      When the hearing ends, the judge reserves decision. You'll have to wait weeks for the ruling.
      The uncertainty is agonizing.
choices:
  - text: "Wait for the ruling, focus on personal resilience"
    goto: ch16_waiting_period
    set:
      legal_conflict: 1
      aleksy_detachment: 50
  - text: "Prepare for both outcomes, develop contingency plans"
    goto: ch16_contingency_planning
    set:
      legal_conflict: 1
      strategic_thinking: 1
