id: ch29_chapter_end
content:
  - type: text
    value: |
      The chapter ends with the news that Mira has reached her threshold and made her choice—she chose to stay in this version.
      If you chose to stay, you're together, building a life, grateful that you made the choice to remain with her.
      She wanted Sava to tell you that she loves you, that she's grateful you stayed.
  - type: pause
    duration: 1000
  - type: text
    value: |
      If you chose to shift, you're in different versions now. She stayed in this version, you shifted to another.
      She's glad you found belonging, even if it's not with her. She hopes you're happy wherever you are.
      The connection that anchored you to this version has become a connection across versions.
  - type: pause
    duration: 800
  - type: text
    value: |
      Either way, the timing mismatch has resolved. Both of you have made your choices. Both of you are building lives in the versions you selected.
      The legal battle established your rights. Now you're living with the consequences of those rights—the freedom to choose which version of reality to inhabit.
  - type: pause
    duration: 800
  - type: text
    value: |
      Dr. Koval's controlled falsehoods have become structural.
      The system now operates on managed truth rather than discovered truth.
      Mira is still your anchor. If you stayed, she's building a life with you, grateful that you chose to remain.
      If you shifted, she's building a life in this version while you build yours in another, connected across the multiplicity by the love you share.
  - type: pause
    duration: 1000
  - type: text
    value: |
      Dr. Kaczmarek is still your ally—checking in on you, supporting your journey, going against the system he works for.
      He believes in understanding. He believes your perception is real. He's willing to help you find answers.
  - type: pause
    duration: 800
  - type: text
    value: |
      This is the continuation of Part III. The legal battle is won, but the personal journey continues.
      The cracks in reality are widening. The system is responding. The convergence is approaching.
      And Sava Illich has been your guide through the threshold—helping you navigate the aftermath of your choice.
choices:
  - text: "Continue to Chapter 30"
    goto: chapter_30
    set:
      chapter_29_completed: 1
