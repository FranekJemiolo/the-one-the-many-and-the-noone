id: ch29_chapter_end
content:
  - type: text
    value: "You leave the administrative facility. Dr. Koval's layered interpretive architecture continues to operate. The system functions with controlled falsehoods in the active layer and truth in the background layer."
  - type: pause
    duration: 1000
  - type: text
    value: "This is not a breakdown of truth. It is an evolution of interpretation. The system has adapted to compression pressure by creating a layered architecture that preserves multiplicity."
  - type: pause
    duration: 800
  - type: text
    value: "You realize the Engine's fear is unfounded. Layered interpretation is not chaos. It is a different way of operating that the Engine cannot control, but that functions perfectly well."
  - type: pause
    duration: 800
  - type: text
    value: "The collapse of singular interpretation has not destroyed the system. It has transformed it into something the Engine cannot recognize as valid, but that works nonetheless."
  - type: pause
    duration: 1000
  - type: text
    value: "This continues the pattern. Oscillation breaks not into chaos, but into new states of multiplicity that the Engine cannot control but that function anyway."
choices:
  - text: "Continue to Chapter 30"
    goto: chapter_30
