id: ch22_multiple_timelines
content:
  - type: text
    value: |
      You begin meeting with Sava regularly. She wants to document your perception in detail, to understand how it develops over time.
      "Your perception is evolving," she says during your second meeting. "The patterns are accelerating. The gaps between realities are widening."
      "What does that mean?"
      "It means you're getting closer to the threshold. The point where you can choose which version of reality to inhabit."
  - type: pause
    duration: 800
  - type: text
    value: |
      "I told you—I don't want to leave this version. Mira is here."
      "I understand. But perception development doesn't respect our intentions. It follows its own patterns."
      She shows you a chart. "These are the documented cases. Most reach the threshold within two years of initial onset. You're at eighteen months."
  - type: pause
    duration: 800
  - type: text
    value: |
      "What happens at the threshold?"
      "The multiplicity becomes fully accessible. You can see all versions simultaneously. You can move between them. You can choose which one to make your home."
      She pauses. "Some people make the choice consciously. Others are pulled in by the version that feels most like home."
  - type: pause
    duration: 1000
  - type: text
    value: |
      "What happens to the people who stay?"
      "They adapt. They learn to navigate the multiplicity without being overwhelmed by it. They become bridges between versions, able to access multiple realities while remaining anchored in one."
      She meets your eyes. "That's the harder path. But it's also the more powerful one."
choices:
  - text: "Ask about the adaptation process"
    goto: ch22_adaptation_process
    set:
      sava_relationship: 1
      adaptation_interest: 1
  - text: "Ask about the choice to shift"
    goto: ch22_shift_choice
    set:
      sava_relationship: 1
      shift_interest: 1
