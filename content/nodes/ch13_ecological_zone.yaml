id: ch13_ecological_zone
content:
  - type: text
    value: "You enter Morrow Vale. This is not a natural ecosystem. It is a constructed ecological zone where machines have been integrated into biological systems."
  - type: pause
    duration: 800
  - type: text
    value: "The environment is unusual. Machines are not just functioning mechanically—they are behaving as if they have memory, as if they are part of a living system."
  - type: pause
    duration: 800
  - type: text
    value: "A mechanical tree does not just process light and water. It remembers previous cycles. It adapts based on what it has experienced."
  - type: pause
    duration: 800
  - type: text
    value: "This is not artificial intelligence in the traditional sense. It is ecological memory—machines that participate in the living memory of the ecosystem."
choices:
  - text: "Observe the machine behavior"
    goto: ch13_machine_behavior
  - text: "Speak with Morrow Vale"
    goto: ch13_morrow_appearance
