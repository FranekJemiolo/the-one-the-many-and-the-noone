id: ch10_chapter_end
content:
  - type: text
    value: |
      The chapter ends with you leaving Dr. Kaczmarek's office, the first documentation session complete.
      If you shared your theory about alternate selves, you feel lighter—Dr. Kaczmarek took it seriously, didn't dismiss you, seemed genuinely interested in understanding your perception.
      The partnership feels like it might actually work.
  - type: pause
    duration: 1000
  - type: text
    value: |
      If you kept your theory private, you feel cautiously optimistic—Dr. Kaczmarek respected your boundaries, didn't push for information you weren't ready to share.
      But you also feel the weight of what you're holding back, the risk of not being fully honest.
  - type: pause
    duration: 800
  - type: text
    value: |
      Either way, the institutional relationship is developing. Dr. Kaczmarek is becoming a known quantity—methodical, respectful, genuinely interested in understanding your perception.
      Whether he's an ally or an adversary remains to be seen, but he's at least someone you can work with.
  - type: pause
    duration: 800
  - type: text
    value: |
      Mira is still your constant. The anchor keeping you grounded while your perception fractures.
      The love you confessed in Chapter 8 is solid, lasting, the foundation for everything that comes next.
  - type: pause
    duration: 1000
  - type: text
    value: |
      This is the end of Part I. The foundation is complete.
      Aleksy as protagonist, with animal POV memories and developing perception.
      Mira as anchor, with resonant perception and deepening love.
      Dr. Kaczmarek as institutional question mark, with genuine interest in understanding.
  - type: pause
    duration: 800
  - type: text
    value: |
      Part II will bring escalation—deeper institutional conflict, the introduction of Sava Illich as your mirror, the convergence of multiple timelines.
      The cracks in reality are widening. The system is responding. The choices you make will determine what comes next.
  - type: pause
    duration: 1000
  - type: text
    value: |
      Clarity Administration is not what it claims to be.
      It's not about clarity—it's about compression. About forcing reality into a single acceptable shape.
      But you're starting to realize that who you are is more complicated than that.
      And with Mira by your side, you're starting to think that might be okay.
choices:
  - text: "Continue to Chapter 11"
    goto: chapter_11
    set:
      chapter_10_completed: 1
