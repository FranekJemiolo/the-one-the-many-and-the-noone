id: ch17_teacher_interaction
content:
  - type: text
    value: |
      Discovery begins. The company turns over their internal documents—emails between HR and legal counsel, meeting notes discussing your case, communications about the "risk" you posed.
      Elena reviews everything, looking for evidence that the company acted in bad faith, that they discriminated against you based on your perception.
  - type: pause
    duration: 800
  - type: text
    value: |
      "This is useful," she says. "There are emails suggesting they discussed termination before the official evaluation. That suggests they made up their mind regardless of the evidence."
      "Can we use that?"
      "Maybe. It suggests bias. But we need more direct evidence of discrimination."
  - type: pause
    duration: 800
  - type: text
    value: |
      Then comes your turn. You have to turn over your documentation—your medical records, your personal journals, your communications with Dr. Kaczmarek.
      It feels invasive, exposing the most intimate details of your perception to strangers who will use it against you.
  - type: pause
    duration: 1000
  - type: text
    value: |
      "I don't want to turn over my journals," you tell Elena. "They're private. They contain thoughts I never intended to share."
      "I understand. But they're relevant evidence. They document the development of your perception, the impact on your daily life, the reality of what you're experiencing."
      She pauses. "If we don't turn them over, the company will argue we're hiding something."
  - type: pause
    duration: 800
  - type: text
    value: |
      Mira is watching you. "What do you want to do?"
      "I don't want to expose myself like this. But I also don't want to lose the case because I held back evidence."
      "There's no right answer here. Just the choice you can live with."
choices:
  - text: "Turn over the journals, accept the exposure"
    goto: ch17_journals_submitted
    set:
      legal_conflict: 1
      discovery_exposure: 1
  - text: "Refuse, fight to protect your privacy"
    goto: ch17_privacy_protected
    set:
      legal_conflict: 1
      privacy_defended: 1
