id: ch4_chapter_end
content:
  - type: text
    value: |
      The chapter ends with you at a crossroads.
      If you chose to hide your perception, you're exhausted from constant pretending, from monitoring yourself, from suppressing what you're actually experiencing.
      But you still have your job. You still have the appearance of normalcy. You still have the illusion of control.
  - type: pause
    duration: 1000
  - type: text
    value: |
      If you chose to embrace your perception, you're on mandatory medical leave. HR is involved. There are talks of psychiatric evaluation.
      But you feel clearer than you ever have. You're no longer living a lie. You're no longer pretending to be someone you're not.
  - type: pause
    duration: 800
  - type: text
    value: |
      Mira has been with you through all of this—supporting your choice even when she disagreed, staying by your side even when things got difficult.
      She's the anchor keeping you grounded while your relationship with reality shifts.
  - type: pause
    duration: 800
  - type: text
    value: |
      The institutional pressure is real now. Whether you hid or embraced, the system has noticed.
      Your supervisor, HR, the machinery of normalcy that enforces conformity—they're all aware that something is different about you.
  - type: pause
    duration: 1000
  - type: text
    value: |
      This is the beginning of institutional conflict. The first collision between your developing perception and the system that requires everyone to perceive reality the same way.
      It won't be the last. The more you develop your abilities, the more the system will push back.
  - type: pause
    duration: 800
  - type: text
    value: |
      The system has noticed. The machinery of normalcy is engaged.
      Whether you hid or embraced, you're now on their radar.
choices:
  - text: "Continue to Chapter 5"
    goto: chapter_5
    set:
      chapter_4_completed: 1
