id: ch4_chapter_end
content:
  - type: text
    value: "You leave the cybernetics facility. The cyborg remains in containment, holding multiple pasts that should be mutually exclusive but aren't."
  - type: pause
    duration: 1000
  - type: text
    value: "The technicians will try to fix the cyborg. They will fail. The cyborg is not broken. The cyborg is what memory becomes when it is no longer constrained by singular causality."
  - type: pause
    duration: 800
  - type: text
    value: "You walk through the city. Everyone around you assumes they have one past. They assume their memory is a record of what actually happened. They don't know that memory could be a library of all possible pasts."
  - type: pause
    duration: 800
  - type: text
    value: "You are now carrying a new secret: causality is not fixed. The past is not a single line. It is a field of possibilities that can be accessed simultaneously if you learn how."
  - type: pause
    duration: 1000
  - type: text
    value: "The cracks are deepening. Memory divergence. Emotional-causal split. Temporal instability. Causal duplication. Reality is not just breaking—it is revealing its true nature as a multiplicity system."
choices:
  - text: "Continue to Chapter 5"
    goto: chapter_5
