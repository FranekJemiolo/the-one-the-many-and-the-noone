id: ch2_to_ch3_bridge
content:
  - type: text
    value: "You arrive at work, but the building feels different—not changed, but interpreted. As if someone else described it to you, and you are now experiencing their description rather than the thing itself."
  - type: pause
    duration: 700
  - type: text
    value: "Your coworkers are there, but their conversations feel scripted—not in a bad way, but in a way that suggests they're following a pattern optimized for something you can't identify."
  - type: pause
    duration: 500
  - type: text
    value: "You make your way to your desk. The terminal is there, waiting. It knows you're coming. You can feel it in the way the air around it seems to vibrate with anticipation."
  - type: pause
    duration: 700
  - type: text
    value: "This is where it began this morning. This is where it will continue. The system is ready for the next phase of your understanding."
choices:
  - text: "Sit at the terminal"
    goto: terminal_return
