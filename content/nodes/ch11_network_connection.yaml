id: ch11_network_connection
content:
  - type: text
    value: |
      The weeks following the first documentation session settle into a rhythm. Weekly meetings with Dr. Kaczmarek, documenting your dreams, tracking your perception, building a case for your value to the company.
      The institutional pressure eases slightly—HR is less concerned now that you're cooperating with a psychiatrist, less likely to push for termination.
  - type: pause
    duration: 800
  - type: text
    value: |
      But your perception continues to develop. The dreams are getting more vivid. The temporal perception is getting more pronounced. The gaps between realities are getting wider.
      And Mira is starting to experience the resonant effects more frequently—deja vu, shared memories, the sense that she's living through moments that have already happened.
  - type: pause
    duration: 800
  - type: text
    value: |
      "It's getting stronger," she says one evening. "The resonance. I feel like I'm perceiving things I shouldn't be able to perceive."
      "I know. I'm sorry."
      "Don't apologize. This isn't your fault. But we need to figure out what's happening before it gets worse."
  - type: pause
    duration: 1000
  - type: text
    value: |
      You call Dr. Kaczmarek the next day. "It's spreading. My perception is affecting Mira. She's experiencing resonant effects."
      "That's significant," he says. "If your perception is transferable, if it can affect the people around you, that changes everything."
      "What do I do?"
  - type: pause
    duration: 800
  - type: text
    value: |
      "We need to document this. We need to understand how the resonance works, what triggers it, whether it can be controlled."
      He pauses. "I want to meet with Mira too. To document her experience directly."
      "She'll agree. She's been documenting everything."
  - type: pause
    duration: 1000
  - type: text
    value: |
      The meeting is scheduled for the following week. Mira is nervous but willing.
      "If this helps us understand what's happening, I'm in," she says. "Whatever it takes."
      You squeeze her hand. "Together."
      "Always together."
choices:
  - text: "Continue with the joint documentation session"
    goto: ch11_joint_session
    set:
      dr_kaczmarek_trust: 75
      mira_resonance: 1
