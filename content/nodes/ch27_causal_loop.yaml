id: ch27_causal_loop
content:
  - type: text
    value: |
      The days after your choice are transformative. If you chose to stay, your perception stabilizes as you adapt to the multiplicity while remaining anchored in this version.
      The dreams become less vivid. The temporal perception becomes manageable. The sense of self solidifies around your connection to Mira.
  - type: pause
    duration: 800
  - type: text
    value: |
      If you chose to shift, your perception stabilizes in the new version. The multiplicity is the norm here—everyone experiences multiple realities, and your perception is no longer unusual.
      You're accepted. You belong. But Mira is gone.
  - type: pause
    duration: 800
  - type: text
    value: |
      Either way, the choice has consequences. Sava calls to check in. "How are you adapting?"
      "Stabilizing. The perception is settling."
      "Good. The adaptation takes time, but you'll find your rhythm."
      She pauses. "And Mira? How is she handling the aftermath?"
  - type: pause
    duration: 1000
  - type: text
    value: |
      If you stayed: "She's relieved. We're building a life together."
      If you shifted: "She's grieving. I exist in another version, but to her I'm gone."
      Sava nods. "That's the cost of the choice. You gain stability, but you pay with connection—or you gain connection, but you pay with stability."
      "There's no perfect choice."
      "No. But there's your choice. And you have to live with it."
choices:
  - text: "Continue to Chapter 28"
    goto: ch27_chapter_end
    set:
      choice_aftermath: 1
