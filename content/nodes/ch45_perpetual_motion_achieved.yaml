id: ch45_perpetual_motion_achieved
content:
  - type: text
    value: "You observe the perpetual motion achieved. In The Shifting World configuration, reality is in constant motion between configurations."
  - type: pause
    duration: 800
  - type: text
    value: "The system shifts between singular, plural, void, and balanced states. No configuration is permanent. Reality is always in transition."
  - type: pause
    duration: 800
  - type: text
    value: "This is the ideal state of perpetual motion. Reality is never static. It is always changing, always novel, always in motion between states."
  - type: pause
    duration: 1000
  - type: text
    value: "You experience the excitement of this configuration. There is perpetual novelty. There is perpetual change. There is perpetual motion between different ways of being."
choices:
  - text: "Observe the oscillation dominance"
    goto: ch45_oscillation_dominance
