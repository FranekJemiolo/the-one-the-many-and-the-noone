id: ch32_archive_integration
content:
  - type: text
    value: |
      The convergence is approaching. You can feel it in the way reality is shifting, in the way the boundaries between versions are becoming more permeable.
      If you chose to stay, you're becoming more adept at accessing other versions while remaining anchored in this one. The multiplicity is becoming more accessible, the gaps between realities widening.
  - type: pause
    duration: 800
  - type: text
    value: |
      If you chose to shift, you're becoming more adept at accessing this version while remaining anchored in the new one. The connection across versions is strengthening, the ability to bridge realities developing.
      Either way, the convergence is real. The system is responding to the choices you've made.
  - type: pause
    duration: 800
  - type: text
    value: |
      Sava calls with an update. "The convergence is accelerating. The system is preparing for a fundamental restructuring."
      "What does that mean?"
      "It means the cracks in reality are widening. The multiplicity is becoming more accessible. The boundaries between versions are becoming more permeable."
      She pauses. "This could lead to a new configuration of reality. One that accommodates multiplicity more fully."
  - type: pause
    duration: 1000
  - type: text
    value: |
      "Is that dangerous?"
      "Not necessarily. But it's unpredictable. The system could restructure in ways we can't anticipate."
      She meets your eyes. "You should prepare. The convergence will affect everyone with unusual perception."
choices:
  - text: "Continue to Chapter 33"
    goto: ch32_chapter_end
    set:
      convergence_approaching: 1
