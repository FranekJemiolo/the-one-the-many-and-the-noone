id: ch1_self_reflection
content:
  - type: text
    value: |
      You sit with the memory of the hunt, trying to understand what it means. The details are vivid—too vivid for a dream.
      The cold in your bones. The focus that narrowed your world to a single moment. The impossible miss when the moment itself changed.
  - type: pause
    duration: 800
  - type: text
    value: |
      You've always had a sensitivity to patterns that others miss—connections between events that seem unrelated, coincidences that feel meaningful, intuitions that prove correct.
      You dismissed this as good investigative instincts, but now you wonder if it's something more fundamental—a different way of perceiving reality.
  - type: pause
    duration: 800
  - type: text
    value: |
      You remember childhood experiences: moments when the world seemed to flicker, when you saw things that weren't there, when time seemed to stretch or compress.
      Your parents called it imagination, your teachers called it distraction, but maybe it was perception—your mind accessing layers of reality that normal perception filters out.
  - type: pause
    duration: 1000
  - type: text
    value: |
      The hunt memory isn't new. It's the awakening of something you've always had but suppressed to fit into normal reality.
      The recognition—that you've missed before, as something else—suggests this isn't an isolated incident. It's part of a pattern you've been ignoring your entire life.
  - type: pause
    duration: 800
  - type: text
    value: |
      This realization brings both comfort and fear. Comfort because it explains your sensitivity, fear because it suggests that your entire life has been a gradual approach to this moment.
      You didn't stumble into this by chance—you were drawn to it by something in your nature.
  - type: pause
    duration: 800
  - type: text
    value: |
      You have a choice: embrace this sensitivity and develop it further, or suppress it and try to return to normal perception.
      But you suspect the choice has already been made. The memory is too vivid, the recognition too certain. There's no going back to not seeing.
choices:
  - text: "Embrace your sensitivity and develop it"
    goto: ch1_chapter_end
    set:
      aleksy_fracture_level: 15
      self_acceptance: 1
  - text: "Try to suppress your sensitivity"
    goto: ch1_chapter_end
    set:
      aleksy_detachment: 15
      self_denial: 1
