id: ch31_named_multiplicity
content:
  - type: text
    value: |
      Years pass after your threshold choice. If you chose to stay, you and Mira have built a stable life together in this version.
      Your perception has fully stabilized—you're adept at navigating the multiplicity, skilled at accessing other versions while remaining anchored in this one.
      You've become a bridge between realities, helping others who are developing unusual perception understand what they're experiencing.
  - type: pause
    duration: 800
  - type: text
    value: |
      If you chose to shift, you've built a stable life in the new version. You're part of a community where multiplicity is the norm, where everyone experiences multiple realities.
      You've found belonging, acceptance, purpose. You've even started helping others who are developing unusual perception in this version.
  - type: pause
    duration: 800
  - type: text
    value: |
      Either way, you're reflecting on identity. Who are you now, after everything that has happened?
      Before the legal battle, you were Aleksy Wrona—a person with unusual perception who was fighting for the right to exist.
      Now you're still Aleksy Wrona—but you're also someone who made a choice about which version of reality to inhabit, someone who is building a life in that version.
  - type: pause
    duration: 1000
  - type: text
    value: |
      "Identity crystallizes," Sava said during your last meeting. "It becomes more stable, more defined, as you live with your choice."
      She was right. You feel more solid now, more certain of who you are.
      The uncertainty of the threshold is behind you. The choice is made. The life is built.
  - type: pause
    duration: 800
  - type: text
    value: |
      But you also feel more multiple. You're not just one person in one version—you're a pattern that exists across multiple realities, anchored in one but connected to others.
      Identity isn't singular anymore. It's multiplicity that has crystallized into a stable form.
choices:
  - text: "Continue to Chapter 32"
    goto: ch31_chapter_end
    set:
      identity_crystallization: 1
