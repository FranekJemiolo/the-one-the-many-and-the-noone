id: ch17_journals_submitted
content:
  - type: text
    value: |
      "I'll turn them over," you say. "I won't let privacy concerns cost me the case."
      Elena nods. "I know this is hard. But it's the right strategic choice."
      She pauses. "I'll redact what I can, but most of it will need to be submitted as-is."
  - type: pause
    duration: 800
  - type: text
    value: |
      The journals are submitted. Strangers—company attorneys, court clerks, possibly a judge—will read your most private thoughts about your perception.
      It feels violating. But you tell yourself it's worth it if it means winning the case.
  - type: pause
    duration: 800
  - type: text
    value: |
      Mira is supportive but concerned. "How are you feeling?"
      "Exposed. Violated. But also resolved."
      She takes your hand. "You're brave. Turning over something so private—it takes courage."
      "It's not courage. It's necessity."
  - type: pause
    duration: 1000
  - type: text
    value: |
      "It's still brave. You're sacrificing your privacy for the chance to win."
      She pauses. "And if you win, if you set the precedent, you make it easier for the next person. The next person who won't have to make this choice."
      You nod. She's right. This isn't just about you. It's about changing the system so the next person doesn't have to choose between privacy and justice.
choices:
  - text: "Continue to Chapter 18"
    goto: ch17_chapter_end
    set:
      legal_conflict: 1
      discovery_exposure: 1
